                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* 提交後的詳解與誘答分析 */}
                                    {isSubmitted && (
                                        <div className={`mt-6 p-5 rounded-lg border ${isCorrect ? 'bg-green-100/50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                            <div className="font-bold mb-2 flex items-center">
                                                {isCorrect ? <span className="text-green-700 flex items-center"><i data-lucide="check" className="mr-1"></i> 答對了！</span>
                                                    : <span className="text-red-700 flex items-center"><i data-lucide="x" className="mr-1"></i> 答錯了，請看解析：</span>}
                                            </div>
                                            {!isCorrect && (
                                                <div className="mb-3 text-sm text-red-800 bg-white p-2 rounded border border-red-100">
                                                    <strong>你的盲點：</strong> {q.options.find(o => o.val === selectedVal)?.exp}
                                                </div>
                                            )}
                                            <p className="text-slate-800">
                                                <strong>💡 正確解析：</strong><br />
                                                {q.correctExplanation}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {!isSubmitted && (
                        <button onClick={handleSubmit} className="mt-10 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-12 rounded-full shadow-xl transition transform hover:scale-105 flex items-center mx-auto text-xl">
                            <i data-lucide="send" className="mr-2"></i> 交卷看成績
                        </button>
                    )}
                </div>
            );
        };

        // --- 數位計算紙 (CLI) 浮動模組 ---
        const CalculatorCLI = () => {
            const [input, setInput] = useState('');
            const [history, setHistory] = useState([]);
            const endRef = useRef(null);

            // 自動捲動到最底部
            useEffect(() => {
                endRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [history]);

            const handleEval = (e) => {
                if (e.key === 'Enter') {
                    if (!input.trim()) return;

                    let expr = input;
                    // 1. 字元替換預處理
                    expr = expr.replace(/[xX×]/g, '*');
                    // 2. 百分比轉換
                    expr = expr.replace(/(\d+(?:\.\d+)?)%/g, '($1/100)');
                    // 3. 次方轉換
                    expr = expr.replace(/\^/g, '**');
                    // 4. 常數與函數對應
                    expr = expr.replace(/pi|π/gi, '3.14');
                    expr = expr.replace(/sqrt/gi, 'Math.sqrt');

                    try {
                        // 5. 安全執行環境 (利用 new Function 隔離運算)
                        let result = new Function(`return ${expr}`)();
                        if (typeof result === 'number' && isFinite(result)) {
                            // 6. 浮點數誤差處理 (四捨五入至小數點後四位)
                            result = Math.round(result * 10000) / 10000;
                        }
                        setHistory(prev => [...prev, { id: Date.now(), expr: input, result: result }]);
                    } catch (err) {
                        setHistory(prev => [...prev, { id: Date.now(), expr: input, result: 'Error' }]);
                    }
                    setInput('');
                }
            };

            const deleteLine = (id) => {
                setHistory(prev => prev.filter(h => h.id !== id));
            };

            return (
                <div className="bg-slate-900 text-green-400 font-mono p-4 rounded-xl shadow-xl w-full h-[400px] flex flex-col border-2 border-slate-700">
                    <div className="flex justify-between items-center mb-2 border-b border-slate-700 pb-2">
                        <span className="text-slate-300 text-sm font-bold flex items-center"><i data-lucide="terminal" className="w-4 h-4 mr-2"></i> 數位計算紙 (CLI)</span>
                        <button onClick={() => setHistory([])} className="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded transition-colors">CLEAR</button>
                    </div>

                    <div className="flex-1 overflow-y-auto space-y-2 mb-2 text-sm pr-1">
                        {history.length === 0 && <div className="text-slate-500 italic mt-2">等待指令...</div>}
                        {history.map(item => (
                            <div key={item.id} className="group flex justify-between items-start bg-slate-800/50 p-2 rounded">
                                <div>
                                    <div className="text-slate-400">&gt; {item.expr}</div>
                                    <div className="text-green-300 font-bold">= {item.result}</div>
                                </div>
                                <button onClick={() => deleteLine(item.id)} className="text-red-400 opacity-0 group-hover:opacity-100 px-1 hover:text-red-300 transition-opacity" title="刪除此行">×</button>
                            </div>
                        ))}
                        <div ref={endRef} />
                    </div>

                    <div className="flex items-center text-sm border-t border-slate-700 pt-3">
                        <span className="mr-2 text-green-500 font-bold">&gt;</span>
                        <input
                            type="text"
                            value={input}
                            onChange={e => setInput(e.target.value)}
                            onKeyDown={handleEval}
                            placeholder="輸入算式..."
                            className="bg-transparent outline-none flex-1 text-green-400 placeholder-slate-600 w-full"
                            autoComplete="off"
                        />
                    </div>
                </div>
            );
        };

        // --- 主應用程式 ---
        const App = () => {
            const [step, setStep] = useState(0);

            useEffect(() => {
                lucide.createIcons();
            }, [step]);

            const steps = [
                {
                    title: "歡迎挑戰", component:
                        <div className="text-center fade-in">
                            <div className="relative inline-block mb-6">
                                <div className="absolute inset-0 bg-green-200 rounded-full blur-xl opacity-50 animate-pulse"></div>
                                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=measure&backgroundColor=d1fae5" alt="機器人助手" className="relative w-32 h-32 mx-auto rounded-full border-4 border-white shadow-xl" />
                            </div>
                            <h1 className="text-4xl md:text-5xl font-extrabold text-green-800 mb-4 tracking-wider drop-shadow-sm">隱形的尺</h1>
                            <h2 className="text-xl md:text-2xl text-gray-600 mb-8 font-medium">間接測量的藝術</h2>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-green-50 max-w-xl mx-auto mb-8">
                                <p className="text-lg text-gray-700 leading-relaxed text-left">
                                    大樹太高爬不上去？山洞太深看不到底？<br />
                                    別擔心！只要學會幾招<strong className="text-green-700">「物理與數學的魔法」</strong>，<br />
                                    我們就能在不直接接觸的情況下，量出這個世界的尺寸！
                                </p>
                            </div>
                            <button onClick={() => setStep(1)} className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-10 rounded-full shadow-lg shadow-green-200 transform transition hover:scale-105 hover:-translate-y-1 text-lg flex items-center mx-auto">
                                開始探索旅程 <i data-lucide="rocket" className="ml-2 w-5 h-5"></i>
                            </button>
                        </div>
                },
                { title: "影子法", component: <ShadowMethod /> },
                { title: "回聲法", component: <EchoMethod /> },
                { title: "進階神器", component: <MirrorAndTool /> },
                { title: "終極挑戰", component: <PressureChallenge /> },
                { title: "素養測驗", component: <QuizChallenge /> }
            ];

            return (
                <div className="min-h-screen py-6 md:py-10 px-4 flex flex-col items-center bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9IiNkY2ZceDciLz48L3N2Zz4=')]">
                    {/* 頂部導航進度列 */}
                    <div className={`w-full ${step === 5 ? 'max-w-6xl' : 'max-w-4xl'} mb-6 flex flex-col md:flex-row justify-between items-center bg-white/90 backdrop-blur p-4 rounded-2xl shadow-sm border border-green-100 gap-4 md:gap-0 transition-all duration-500`}>
                        <div className="text-xl font-extrabold text-green-700 flex items-center tracking-wide">
                            <i data-lucide="ruler" className="mr-2 text-green-600"></i> 測量大師學院
                        </div>
                        <div className="flex flex-wrap justify-center space-x-2 md:space-x-3">
                            {steps.map((s, idx) => (
                                <div key={idx}
                                    onClick={() => setStep(idx)}
                                    className={`flex items-center px-3 py-1.5 rounded-full cursor-pointer transition-all duration-300 ${idx === step ? 'bg-green-500 text-white shadow-md font-bold' : 'bg-gray-100 text-gray-500 hover:bg-green-100 hover:text-green-700'}`}
                                    title={s.title}
                                >
                                    <span className="text-xs md:text-sm">{s.title}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className={`w-full ${step === 5 ? 'max-w-6xl' : 'max-w-4xl'} bg-white min-h-[550px] rounded-3xl shadow-xl shadow-green-900/5 p-6 md:p-10 flex flex-col lg:flex-row items-start relative border-t-[10px] border-green-500 gap-8 transition-all duration-500`}>

                        {/* 左側主內容區 */}
                        <div className="flex-1 w-full flex flex-col items-center justify-center min-w-0">
                            {steps[step].component}

                            {/* 底部「上一單元/下一單元」按鈕 (首尾微調) */}
                            {step > 0 && step < steps.length && (
                                <div className="w-full flex justify-between mt-12 border-t border-slate-100 pt-6">
                                    <button onClick={() => setStep(Math.max(0, step - 1))} className="flex items-center text-gray-500 hover:text-green-700 font-bold transition px-4 py-2 rounded-full hover:bg-gray-50">
                                        <i data-lucide="arrow-left" className="mr-1 w-5 h-5"></i> 上一單元
                                    </button>
                                    {step < steps.length - 1 && (
                                        <button onClick={() => setStep(step + 1)} className="flex items-center text-white bg-green-500 hover:bg-green-600 font-bold transition px-6 py-2 rounded-full shadow-md hover:shadow-lg">
                                            下一單元 <i data-lucide="arrow-right" className="ml-1 w-5 h-5"></i>
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* 右側數位計算紙 (CLI) - 利用隱藏而非卸載來維持歷史紀錄狀態 */}
                        <div className={step === 5 ? "w-full lg:w-80 flex-shrink-0 sticky top-24 z-10" : "hidden"}>
                            <CalculatorCLI />
                            <p className="text-xs text-slate-500 mt-2 text-center">💡 支援: <code className="bg-slate-100 px-1 rounded">x</code>, <code className="bg-slate-100 px-1 rounded">%</code>, <code className="bg-slate-100 px-1 rounded">^</code>, <code className="bg-slate-100 px-1 rounded">pi</code>, <code className="bg-slate-100 px-1 rounded">sqrt( )</code></p>
                        </div>
                    </div>

                    <footer className="mt-10 text-center text-green-800/60 text-sm font-medium">
                        設計給對世界充滿好奇的你。數學（相似形）與自然（聲波、光學）完美結合。
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
