<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圓形幾何互動學習系統</title>

    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 設定 Tailwind 自訂動畫 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'bounce-short': 'bounceShort 1s ease-in-out 2',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        bounceShort: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- 引入 Babel 用於在瀏覽器中編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SVG 圖示元件 ---
        const IconRotateCcw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /></svg>);
        const IconCircle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /></svg>);
        const IconSquare = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" /></svg>);
        const IconHexagon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2" /></svg>);
        const IconPlay = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="6 3 20 12 6 21 6 3" /></svg>);
        const IconInfo = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><path d="M12 16v-4" /><path d="M12 8h.01" /></svg>);
        const IconArrowRight = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></svg>);
        const IconPenTool = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19 7-7 3 3-7 7-3-3z" /><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" /><path d="m2 2 7.586 7.586" /><circle cx="11" cy="11" r="2" /></svg>);
        const IconPlus = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14" /><path d="M12 5v14" /></svg>);
        const IconTrash = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></svg>);
        const IconCheck = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12" /></svg>);

        // --- 主應用程式元件 ---
        function App() {
            const [activeTab, setActiveTab] = useState('pi');

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">

                        <header className="mb-8 text-center">
                            <h1 className="text-4xl font-extrabold text-blue-600 mb-2 tracking-tight">
                                發現圓的秘密 🎯
                            </h1>
                            <p className="text-lg text-slate-600">
                                動動手、看動畫，一步步破解圓周率與圓面積的數學魔法！
                            </p>
                        </header>

                        {/* Navigation Tabs */}
                        <div className="flex flex-wrap justify-center gap-2 mb-8">
                            <TabButton active={activeTab === 'pi'} onClick={() => setActiveTab('pi')} icon={<IconRotateCcw className="w-5 h-5" />} label="一、認識圓周率" />
                            <TabButton active={activeTab === 'ancient'} onClick={() => setActiveTab('ancient')} icon={<IconHexagon className="w-5 h-5" />} label="二、古人的智慧" />
                            <TabButton active={activeTab === 'circumference'} onClick={() => setActiveTab('circumference')} icon={<IconCircle className="w-5 h-5" />} label="三、圓周長公式" />
                            <TabButton active={activeTab === 'area'} onClick={() => setActiveTab('area')} icon={<IconSquare className="w-5 h-5" />} label="四、圓面積推導" />
                            <TabButton active={activeTab === 'practice'} onClick={() => setActiveTab('practice')} icon={<IconPenTool className="w-5 h-5" />} label="五、實地演練" />
                        </div>

                        {/* Content Area */}
                        <main className="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 min-h-[500px]">
                            {activeTab === 'pi' && <PiDiscoveryModule />}
                            {activeTab === 'ancient' && <AncientPiModule />}
                            {activeTab === 'circumference' && <CircumferenceModule />}
                            {activeTab === 'area' && <AreaDerivationModule />}
                            {activeTab === 'practice' && <PracticeModule />}
                        </main>

                    </div>
                </div>
            );
        }

        function TabButton({ active, onClick, icon, label }) {
            return (
                <button
                    onClick={onClick}
                    className={`flex items-center gap-2 px-4 py-3 rounded-full font-bold text-sm md:text-base transition-all duration-300 ${active
                            ? 'bg-blue-600 text-white shadow-md transform scale-105'
                            : 'bg-white text-slate-500 hover:bg-blue-50 hover:text-blue-600 border border-slate-200'
                        }`}
                >
                    {icon}
                    {label}
                </button>
            );
        }

        function SectionHeader({ title, description }) {
            return (
                <div className="bg-blue-50 p-6 border-b border-blue-100">
                    <h2 className="text-2xl font-bold text-blue-800 flex items-center gap-2">
                        <IconInfo className="w-6 h-6 text-blue-500" />
                        {title}
                    </h2>
                    <p className="mt-2 text-blue-900/80 text-lg leading-relaxed">{description}</p>
                </div>
            );
        }

        // ==========================================
        // 模組 1: 圓周率推導
        // ==========================================
        function PiDiscoveryModule() {
            const [roll, setRoll] = useState(0);
            const R = 40, D = R * 2, C = Math.PI * D, startX = 60, groundY = 220;
            const currentX = startX + roll * C, rotation = roll * 360;

            return (
                <div className="animate-fade-in opacity-0">
                    <SectionHeader title="什麼是「圓周率 (π)」？" description="拖曳下方的滑桿，讓輪子滾動一整圈。觀察它在地上走過的距離和它的「直徑」有什麼關係？" />
                    <div className="p-8">
                        <div className="w-full overflow-x-auto no-scrollbar bg-slate-50 rounded-xl mb-6 shadow-inner">
                            <svg viewBox="0 0 450 300" className="w-full h-auto min-w-[600px]">
                                <line x1="20" y1={groundY} x2="420" y2={groundY} stroke="#94a3b8" strokeWidth="4" strokeLinecap="round" />
                                {[0, 1, 2, 3].map(i => (
                                    <g key={i} transform={`translate(${startX + i * D}, ${groundY})`}>
                                        <line x1="0" y1="-5" x2="0" y2="15" stroke="#64748b" strokeWidth="2" />
                                        <text x="0" y="35" textAnchor="middle" fill="#64748b" className="text-sm font-bold">{i === 0 ? '起點' : `${i} 個直徑`}</text>
                                    </g>
                                ))}
                                <g transform={`translate(${startX + C}, ${groundY})`}>
                                    <line x1="0" y1="-10" x2="0" y2="20" stroke="#ef4444" strokeWidth="3" />
                                    <text x="0" y="40" textAnchor="middle" fill="#ef4444" className="text-sm font-bold">一圈 (約 3.14 個直徑)</text>
                                </g>
                                <line x1={startX} y1={groundY - 2} x2={currentX} y2={groundY - 2} stroke="#3b82f6" strokeWidth="6" strokeLinecap="round" />
                                <g transform={`translate(${currentX}, ${groundY - R})`}>
                                    <circle cx="0" cy="0" r={R} fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" strokeWidth="4" />
                                    <g transform={`rotate(${rotation})`}>
                                        <line x1="0" y1="0" x2="0" y2={R} stroke="#ef4444" strokeWidth="4" strokeLinecap="round" />
                                        <circle cx="0" cy="0" r="4" fill="#1e40af" />
                                    </g>
                                </g>
                                <g transform={`translate(${currentX}, ${groundY - R * 2 - 20})`}>
                                    <line x1={-R} y1="0" x2={R} y2="0" stroke="#f59e0b" strokeWidth="2" />
                                    <line x1={-R} y1="-5" x2={-R} y2="5" stroke="#f59e0b" strokeWidth="2" />
                                    <line x1={R} y1="-5" x2={R} y2="5" stroke="#f59e0b" strokeWidth="2" />
                                    <text x="0" y="-10" textAnchor="middle" fill="#d97706" className="text-sm font-bold">直徑</text>
                                </g>
                            </svg>
                        </div>
                        <div className="max-w-md mx-auto space-y-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <div>
                                <label className="flex justify-between text-lg font-bold text-slate-700 mb-2">
                                    <span>滾動進度：</span><span className="text-blue-600">{Math.round(roll * 100)}%</span>
                                </label>
                                <input type="range" min="0" max="1" step="0.01" value={roll} onChange={(e) => setRoll(parseFloat(e.target.value))} className="w-full h-3 bg-blue-100 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                            </div>
                            <div className="bg-amber-50 p-4 rounded-xl border border-amber-200">
                                <p className="text-lg text-amber-900 font-medium leading-relaxed">
                                    💡 <strong>結論：</strong> 無論圓有多大，它滾動一圈的長度（圓周長），永遠大約是它直徑的 <strong className="text-2xl text-red-500 mx-1">3.14</strong> 倍。我們把這個神祕的數字稱為 <strong>圓周率 (π)</strong>。
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 模組 2: 古人的智慧 (割圓術)
        // ==========================================
        function AncientPiModule() {
            const sidesOptions = [6, 12, 24, 48, 96, 192];
            const [sliderIndex, setSliderIndex] = useState(0);
            const sides = sidesOptions[sliderIndex];
            const R = 110, cx = 150, cy = 150;
            const points = Array.from({ length: sides }).map((_, i) => {
                const theta = (i * 2 * Math.PI) / sides - Math.PI / 2;
                return `${cx + R * Math.cos(theta)},${cy + R * Math.sin(theta)}`;
            }).join(' ');
            const approxPi = (sides * Math.sin(Math.PI / sides));

            return (
                <div className="animate-fade-in opacity-0">
                    <SectionHeader title="像古人一樣計算：割圓術" description="在沒有電腦的古代，數學家利用在圓內畫「正多邊形」來逼近圓形。邊數越多，多邊形的周長就越接近真正的圓周長！" />
                    <div className="p-8 grid md:grid-cols-2 gap-8 items-center">
                        <div className="flex flex-col items-center">
                            <div className="relative w-72 h-72 drop-shadow-xl bg-white rounded-full border border-slate-100 flex items-center justify-center p-4">
                                <svg viewBox="0 0 300 300" className="w-full h-full">
                                    <circle cx={cx} cy={cy} r={R} fill="rgba(226, 232, 240, 0.3)" stroke="#cbd5e1" strokeWidth="3" strokeDasharray="6 4" />
                                    <polygon points={points} fill="rgba(59, 130, 246, 0.15)" stroke="#2563eb" strokeWidth="3" strokeLinejoin="round" className="transition-all duration-300" />
                                    <g style={{ opacity: sides <= 24 ? 1 : 0, transition: 'opacity 0.3s' }}>
                                        <circle cx={cx} cy={cy} r="4" fill="#1e40af" />
                                        <line x1={cx} y1={cy} x2={cx} y2={cy - R} stroke="#94a3b8" strokeWidth="2" strokeDasharray="4 2" />
                                    </g>
                                    {sides <= 48 && Array.from({ length: sides }).map((_, i) => {
                                        const theta = (i * 2 * Math.PI) / sides - Math.PI / 2;
                                        return <circle key={i} cx={cx + R * Math.cos(theta)} cy={cy + R * Math.sin(theta)} r={sides <= 12 ? "4" : "2"} fill="#ef4444" />;
                                    })}
                                </svg>
                            </div>
                            <p className="mt-4 text-slate-500 font-medium italic text-center">
                                「割之彌細，所失彌少，割之又割...」<br />— 劉徽《九章算術注》
                            </p>
                        </div>
                        <div className="space-y-6">
                            <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-sm">
                                <label className="flex justify-between text-lg font-bold text-slate-700 mb-4">
                                    <span>增加多邊形的邊數：</span><span className="text-blue-600 bg-blue-100 px-3 py-1 rounded-full border border-blue-200">正 {sides} 邊形</span>
                                </label>
                                <input type="range" min="0" max={sidesOptions.length - 1} step="1" value={sliderIndex} onChange={(e) => setSliderIndex(parseInt(e.target.value))} className="w-full h-3 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                <h3 className="text-xl font-extrabold text-slate-800 border-b pb-2">推算結果</h3>
                                <div className="flex justify-between items-center text-lg">
                                    <span className="text-slate-600 font-medium">多邊形周長 ÷ 直徑：</span><span className="text-2xl font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg font-mono">{approxPi.toFixed(5)}</span>
                                </div>
                                <div className="flex justify-between items-center text-lg">
                                    <span className="text-slate-600 font-medium">現代真實的圓周率：</span><span className="text-xl font-bold text-slate-400 font-mono">3.14159...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 模組 3: 圓周長公式
        // ==========================================
        function CircumferenceModule() {
            const [radius, setRadius] = useState(5);
            const diameter = radius * 2;
            const circumference = (diameter * 3.14).toFixed(2);

            return (
                <div className="animate-fade-in opacity-0">
                    <SectionHeader title="怎麼計算「圓周長」？" description="既然我們知道了圓周長是直徑的 π 倍（大約 3.14 倍），那我們就可以用公式輕鬆算出來囉！" />
                    <div className="p-8 grid md:grid-cols-2 gap-8 items-center">
                        <div className="flex justify-center">
                            <svg viewBox="-110 -110 220 220" className="w-64 h-64 drop-shadow-lg">
                                <circle cx="0" cy="0" r="100" fill="#e0f2fe" stroke="#0ea5e9" strokeWidth="8" />
                                <line x1="0" y1="0" x2={100} y2="0" stroke="#ef4444" strokeWidth="6" strokeLinecap="round" />
                                <circle cx="0" cy="0" r={radius * 10} fill="rgba(239, 68, 68, 0.2)" stroke="#ef4444" strokeWidth="2" strokeDasharray="4 4" />
                                <circle cx="0" cy="0" r="6" fill="#1e40af" />
                                <text x="50" y="-15" textAnchor="middle" fill="#ef4444" className="text-xl font-bold">r = {radius}</text>
                                <path id="curve" d="M -90,0 A 90,90 0 0,1 90,0" fill="transparent" />
                                <text width="500"><textPath href="#curve" startOffset="50%" textAnchor="middle" fill="#0ea5e9" className="text-xl font-bold">圓周長</textPath></text>
                            </svg>
                        </div>
                        <div className="space-y-8 bg-slate-50 p-6 rounded-2xl border border-slate-200">
                            <div>
                                <label className="flex justify-between text-lg font-bold text-slate-700 mb-2">
                                    <span>調整半徑 (r)：</span><span className="text-red-500 bg-red-100 px-3 py-1 rounded-full">{radius} cm</span>
                                </label>
                                <input type="range" min="1" max="10" step="1" value={radius} onChange={(e) => setRadius(parseInt(e.target.value))} className="w-full h-3 bg-red-100 rounded-lg appearance-none cursor-pointer accent-red-500" />
                            </div>
                            <div className="space-y-4 text-xl">
                                <div className="flex items-center gap-4 bg-white p-4 rounded-xl shadow-sm">
                                    <span className="font-bold text-slate-500">直徑 (d)</span><IconArrowRight className="text-slate-300 w-6 h-6" />
                                    <span className="font-bold text-blue-900">半徑 × 2 = <span className="text-fuchsia-600">{diameter}</span> cm</span>
                                </div>
                                <div className="flex items-center gap-4 bg-blue-100 p-4 rounded-xl shadow-sm border border-blue-200">
                                    <span className="font-bold text-blue-800">圓周長</span><IconArrowRight className="text-blue-500 w-6 h-6" />
                                    <div className="font-bold text-blue-900 flex flex-col">
                                        <span>直徑 × π</span>
                                        <span className="text-2xl mt-1 text-blue-700">{diameter} × 3.14 = <span className="bg-white px-2 py-1 rounded-lg text-blue-600 shadow-inner">{circumference}</span></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 模組 4: 圓面積推導
        // ==========================================
        function AreaDerivationModule() {
            const [slices, setSlices] = useState(8);
            const [isRearranged, setIsRearranged] = useState(false);
            const R = 90, n = slices, theta = (2 * Math.PI) / n;
            const x1 = -R * Math.sin(theta / 2), y1 = -R * Math.cos(theta / 2);
            const x2 = R * Math.sin(theta / 2), y2 = -R * Math.cos(theta / 2);
            const pathData = `M 0 0 L ${x1} ${y1} A ${R} ${R} 0 0 1 ${x2} ${y2} Z`;
            const chord = 2 * R * Math.sin(theta / 2), h = R * Math.cos(theta / 2);
            const circleCx = 180, circleCy = 200, rectStartX = 450 - ((n / 2) * chord) / 2, rectY = 200 + h / 2;

            const wedges = Array.from({ length: n }).map((_, i) => {
                const circleTransform = `translate(${circleCx}px, ${circleCy}px) rotate(${(i * 360) / n}deg)`;
                let rectTransform = '';
                if (i % 2 === 0) {
                    rectTransform = `translate(${rectStartX + (i / 2) * chord}px, ${rectY}px) rotate(0deg)`;
                } else {
                    rectTransform = `translate(${rectStartX + Math.floor(i / 2) * chord + chord / 2}px, ${rectY - h}px) rotate(180deg)`;
                }
                return (
                    <path key={i} d={pathData} fill={i % 2 === 0 ? '#60A5FA' : '#34D399'} stroke={i % 2 === 0 ? '#3B82F6' : '#10B981'} strokeWidth="1"
                        style={{ transform: isRearranged ? rectTransform : circleTransform, transition: 'transform 1s cubic-bezier(0.4, 0, 0.2, 1)', transformOrigin: '0px 0px' }} />
                );
            });

            return (
                <div className="animate-fade-in opacity-0">
                    <SectionHeader title="像切披薩一樣推導「圓面積」！" description="我們把圓形切成很多塊，然後重新拼起來看看會變成什麼形狀！" />
                    <div className="p-8">
                        <div className="flex flex-wrap justify-center gap-8 mb-8 bg-slate-50 p-6 rounded-xl border border-slate-200 shadow-sm">
                            <div className="flex-1 min-w-[250px] max-w-sm">
                                <label className="flex justify-between text-lg font-bold text-slate-700 mb-2">
                                    <span>切成幾塊？</span><span className="text-blue-600 bg-blue-100 px-3 py-1 rounded-full">{slices} 塊</span>
                                </label>
                                <input type="range" min="4" max="64" step="4" value={slices} onChange={(e) => { setSlices(parseInt(e.target.value)); setIsRearranged(false); }} className="w-full h-3 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                            </div>
                            <div className="flex items-end">
                                <button onClick={() => setIsRearranged(!isRearranged)} className={`flex items-center gap-2 px-8 py-3 rounded-xl font-bold text-xl text-white transition-all shadow-lg transform hover:scale-105 ${isRearranged ? 'bg-amber-500 hover:bg-amber-600' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                                    {isRearranged ? <IconRotateCcw className="w-6 h-6" /> : <IconPlay className="w-6 h-6" />}
                                    {isRearranged ? '變回圓形' : '開始拼圖！'}
                                </button>
                            </div>
                        </div>
                        <div className="w-full overflow-x-auto no-scrollbar bg-white rounded-2xl border-2 border-slate-100 shadow-inner mb-6 relative">
                            <svg viewBox="0 0 800 350" className="w-full h-auto min-w-[800px]">
                                <g style={{ opacity: isRearranged ? 1 : 0, transition: 'opacity 1s 0.5s' }}>
                                    <line x1={rectStartX - 20} y1={rectY - h} x2={rectStartX - 20} y2={rectY} stroke="#ef4444" strokeWidth="2" strokeDasharray="4 4" />
                                    <text x={rectStartX - 30} y={rectY - h / 2} textAnchor="end" fill="#ef4444" className="font-bold text-lg">高 = 半徑 (r)</text>
                                    <line x1={rectStartX} y1={rectY + 20} x2={rectStartX + (n / 2) * chord} y2={rectY + 20} stroke="#3b82f6" strokeWidth="2" strokeDasharray="4 4" />
                                    <text x={rectStartX + ((n / 2) * chord) / 2} y={rectY + 45} textAnchor="middle" fill="#3b82f6" className="font-bold text-lg">底 = 圓周長的一半 (π × r)</text>
                                </g>
                                {wedges}
                                <g style={{ opacity: isRearranged ? 0 : 1, transition: 'opacity 0.5s' }}>
                                    <text x={circleCx} y={circleCy + R + 30} textAnchor="middle" fill="#64748b" className="font-bold text-lg">切成 {slices} 等分的圓</text>
                                </g>
                            </svg>
                        </div>
                        <div className={`transition-all duration-700 overflow-hidden ${isRearranged ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0'}`}>
                            <div className="bg-emerald-50 border-2 border-emerald-200 p-6 rounded-2xl">
                                <ul className="space-y-3 text-lg text-emerald-900">
                                    <li className="flex items-start gap-2 pt-4 mt-2 border-t border-emerald-200/50">
                                        <span className="font-bold text-emerald-700 leading-10">結論公式：</span>
                                        <span className="bg-white px-4 py-2 rounded-lg shadow-sm text-xl font-bold text-emerald-700 inline-block">面積 = 底 × 高 = <span className="text-blue-600">(π × r)</span> × <span className="text-red-500">r</span> = πr²</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 模組 5: 實地演練 (新增)
        // ==========================================
        // 安全評估算式的小型解析器 (支援四則運算、括號、pi)
        function evaluateExpression(str) {
            if (!str || str.trim() === '') return '';
            // 替換中文常見全形或特定字元
            let parsed = str
                .replace(/π/g, '3.14')
                .replace(/pi/gi, '3.14')
                .replace(/×/g, '*')
                .replace(/÷/g, '/')
                .replace(/\^/g, '**')
                .replace(/（/g, '(')
                .replace(/）/g, ')');

            // 為了安全，只允許數字、算術符號、空白與小數點
            if (/[^0-9+\-*/().\s*]/.test(parsed)) return '錯誤';

            try {
                // 利用 Function 進行安全評估
                let val = new Function('return ' + parsed)();
                if (typeof val === 'number' && !isNaN(val) && isFinite(val)) {
                    // 四捨五入到小數點後兩位
                    return Math.round(val * 100) / 100;
                }
                return '';
            } catch (e) {
                return '...';
            }
        }

        // 隨機題庫生成器
        function generateQuestion() {
            const types = ['circumference', 'area', 'find_d', 'find_r'];
            const type = types[Math.floor(Math.random() * types.length)];

            const niceNumbers = [5, 10, 15, 20, 25, 30, 40, 50];
            const r = niceNumbers[Math.floor(Math.random() * niceNumbers.length)];
            const d = r * 2;
            const c = Math.round((d * 3.14) * 100) / 100;
            const a = Math.round((3.14 * r * r) * 100) / 100;

            switch (type) {
                case 'circumference':
                    return {
                        text: `摩天輪的半徑是 ${r} 公尺。請問摩天輪的外圈（圓周長）大約是多少公尺？`,
                        hint: '提示：圓周長 = 直徑 × 3.14',
                        answer: c,
                        svg: 'ferris-wheel'
                    };
                case 'area':
                    return {
                        text: `媽媽買了一個大披薩，直徑是 ${d} 公分。請問這個披薩的表面積是多少平方公分？`,
                        hint: '提示：圓面積 = 半徑 × 半徑 × 3.14',
                        answer: a,
                        svg: 'pizza'
                    };
                case 'find_d':
                    return {
                        text: `自然課時，小明用皮尺量一棵神木的樹幹，周長剛好是 ${c} 公尺。請問這棵神木的直徑大約是多少公尺？`,
                        hint: '提示：直徑 = 周長 ÷ 3.14',
                        answer: d,
                        svg: 'tree'
                    };
                case 'find_r':
                    return {
                        text: `公園的自動灑水器可以噴灑出的面積是 ${a} 平方公尺。請問它可以噴灑到的最遠距離（半徑）是多少公尺？`,
                        hint: '提示：半徑² = 面積 ÷ 3.14',
                        answer: r,
                        svg: 'sprinkler'
                    };
            }
        }

        // 依據類型繪製生動圖解
        function QuestionSVG({ type }) {
            if (type === 'ferris-wheel') return (
                <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md">
                    <line x1="50" y1="50" x2="20" y2="100" stroke="#94a3b8" strokeWidth="4" />
                    <line x1="50" y1="50" x2="80" y2="100" stroke="#94a3b8" strokeWidth="4" />
                    <circle cx="50" cy="45" r="40" fill="none" stroke="#3b82f6" strokeWidth="6" strokeDasharray="4 4" className="origin-center animate-[spin_10s_linear_infinite]" />
                    <circle cx="50" cy="45" r="6" fill="#1e40af" />
                    {[0, 45, 90, 135, 180, 225, 270, 315].map(deg => (
                        <line key={deg} x1="50" y1="45" x2={50 + 40 * Math.cos(deg * Math.PI / 180)} y2={45 + 40 * Math.sin(deg * Math.PI / 180)} stroke="#60a5fa" strokeWidth="2" />
                    ))}
                </svg>
            );
            if (type === 'pizza') return (
                <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md origin-center hover:scale-105 transition-transform">
                    <circle cx="50" cy="50" r="45" fill="#fcd34d" stroke="#d97706" strokeWidth="4" />
                    <circle cx="50" cy="50" r="38" fill="#fef08a" />
                    <circle cx="30" cy="40" r="5" fill="#ef4444" /><circle cx="65" cy="35" r="5" fill="#ef4444" /><circle cx="50" cy="70" r="5" fill="#ef4444" /><circle cx="70" cy="65" r="5" fill="#ef4444" /><circle cx="35" cy="65" r="5" fill="#ef4444" />
                </svg>
            );
            if (type === 'tree') return (
                <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md">
                    <path d="M 30 100 Q 40 50 40 20 L 60 20 Q 60 50 70 100 Z" fill="#8B4513" />
                    <ellipse cx="50" cy="20" rx="10" ry="5" fill="#A0522D" />
                    <ellipse cx="50" cy="50" rx="10" ry="4" fill="none" stroke="#66c2ff" strokeWidth="3" strokeDasharray="2 2" className="animate-pulse" />
                </svg>
            );
            if (type === 'sprinkler') return (
                <svg viewBox="0 0 100 100" className="w-32 h-32 mx-auto drop-shadow-md">
                    <ellipse cx="50" cy="70" rx="45" ry="15" fill="#86efac" opacity="0.5" />
                    <rect x="45" y="65" width="10" height="20" fill="#475569" />
                    <path d="M 50 65 L 30 40 M 50 65 L 50 35 M 50 65 L 70 40" stroke="#3b82f6" strokeWidth="2" strokeDasharray="3 3" className="animate-pulse" />
                </svg>
            );
            return null;
        }

        function PracticeModule() {
            const [question, setQuestion] = useState(null);
            const [lines, setLines] = useState([{ id: Date.now(), expr: '', val: '' }]);
            const [isCorrect, setIsCorrect] = useState(null);

            // 初始化生成題目
            useEffect(() => {
                setQuestion(generateQuestion());
            }, []);

            const handleAddLine = () => {
                setLines([...lines, { id: Date.now(), expr: '', val: '' }]);
            };

            const handleRemoveLine = (id) => {
                if (lines.length === 1) return;
                setLines(lines.filter(l => l.id !== id));
            };

            const handleExprChange = (id, newExpr) => {
                setIsCorrect(null); // Reset correctness on edit
                setLines(lines.map(l =>
                    l.id === id ? { ...l, expr: newExpr, val: evaluateExpression(newExpr) } : l
                ));
            };

            const checkAnswer = () => {
                // 取得最後一行有數字的結果
                const validLines = lines.filter(l => typeof l.val === 'number');
                if (validLines.length === 0) {
                    alert('請輸入有效的數學算式喔！');
                    return;
                }
                const finalAns = validLines[validLines.length - 1].val;
                // 容許小數點浮點運算的微小差異
                if (Math.abs(finalAns - question.answer) < 0.1) {
                    setIsCorrect(true);
                } else {
                    setIsCorrect(false);
                }
            };

            const nextQuestion = () => {
                setQuestion(generateQuestion());
                setLines([{ id: Date.now(), expr: '', val: '' }]);
                setIsCorrect(null);
            };

            if (!question) return null;

            return (
                <div className="animate-fade-in opacity-0">
                    <SectionHeader
                        title="數位演練計算紙"
                        description="請在右側的計算紙列出算式，你可以使用 +, -, *, /, () 以及 3.14 (或 π)。系統會主動幫你算出結果，讓你專注在思考邏輯！"
                    />

                    <div className="p-4 md:p-8 flex flex-col md:flex-row gap-8 items-stretch">
                        {/* 左側：題目區 */}
                        <div className="flex-1 bg-amber-50 rounded-3xl p-6 border-2 border-amber-200 flex flex-col justify-between shadow-sm relative overflow-hidden">
                            {/* 正確時的特效裝飾 */}
                            {isCorrect && (
                                <div className="absolute top-0 left-0 w-full h-2 bg-emerald-400"></div>
                            )}

                            <div>
                                <div className="bg-amber-100 text-amber-800 text-sm font-bold px-3 py-1 rounded-full inline-block mb-4">
                                    情境應用題
                                </div>
                                <h3 className="text-xl md:text-2xl font-bold text-slate-800 leading-relaxed mb-6">
                                    {question.text}
                                </h3>

                                <div className="my-8">
                                    <QuestionSVG type={question.svg} />
                                </div>
                            </div>

                            <div className="bg-white/60 p-4 rounded-xl text-amber-900 border border-amber-200/50">
                                {question.hint}
                                <div className="text-sm text-slate-500 mt-2">
                                    * 註：圓周率請以 <strong>3.14</strong> 或 <strong>π</strong> 計算。
                                </div>
                            </div>
                        </div>

                        {/* 右側：數位計算紙 */}
                        <div className="flex-[1.2] bg-slate-800 rounded-3xl p-6 md:p-8 shadow-xl flex flex-col font-mono text-white relative">
                            <div className="flex justify-between items-center mb-6 border-b border-slate-600 pb-4">
                                <h3 className="text-xl font-bold text-emerald-400 flex items-center gap-2">
                                    <IconPenTool className="w-6 h-6" /> 運算推導區
                                </h3>
                                {isCorrect && (
                                    <span className="bg-emerald-500/20 text-emerald-400 px-4 py-1 rounded-full font-bold flex items-center gap-2 animate-bounce-short">
                                        <IconCheck className="w-5 h-5" /> 答對了！
                                    </span>
                                )}
                                {isCorrect === false && (
                                    <span className="bg-red-500/20 text-red-400 px-4 py-1 rounded-full font-bold">
                                        再試一次！
                                    </span>
                                )}
                            </div>

                            {/* 算式列表 */}
                            <div className="flex-1 space-y-4 mb-8">
                                {lines.map((line, index) => (
                                    <div key={line.id} className="flex items-center gap-3">
                                        <div className="text-slate-500 w-6 text-right select-none">{index + 1}.</div>
                                        <input
                                            type="text"
                                            value={line.expr}
                                            onChange={(e) => handleExprChange(line.id, e.target.value)}
                                            placeholder="例如: 10 * 10 * 3.14"
                                            className="flex-1 bg-slate-900 border border-slate-700 text-emerald-300 px-4 py-3 rounded-xl focus:outline-none focus:border-emerald-500 transition-colors text-lg"
                                            disabled={isCorrect}
                                        />
                                        <div className="text-slate-400 text-lg w-8 text-center">=</div>
                                        <div className="w-24 bg-slate-700/50 h-12 rounded-xl flex items-center px-3 text-white font-bold text-lg overflow-hidden whitespace-nowrap">
                                            {line.val}
                                        </div>
                                        {lines.length > 1 && !isCorrect && (
                                            <button onClick={() => handleRemoveLine(line.id)} className="text-slate-500 hover:text-red-400 transition-colors p-2">
                                                <IconTrash className="w-5 h-5" />
                                            </button>
                                        )}
                                    </div>
                                ))}

                                {!isCorrect && (
                                    <button onClick={handleAddLine} className="flex items-center gap-2 text-slate-400 hover:text-emerald-400 transition-colors py-2 px-10">
                                        <IconPlus className="w-5 h-5" /> 新增算式
                                    </button>
                                )}
                            </div>

                            {/* 操作按鈕 */}
                            <div className="flex justify-end gap-4 border-t border-slate-600 pt-6">
                                {!isCorrect ? (
                                    <button
                                        onClick={checkAnswer}
                                        className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-transform transform hover:scale-105 active:scale-95 text-lg"
                                    >
                                        送出答案
                                    </button>
                                ) : (
                                    <button
                                        onClick={nextQuestion}
                                        className="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-transform transform hover:scale-105 active:scale-95 text-lg flex items-center gap-2"
                                    >
                                        挑戰下一題 <IconArrowRight className="w-5 h-5" />
                                    </button>
                                )}
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
