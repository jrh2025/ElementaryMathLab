                                <div className="space-y-4">
                                    {/* GCD */}
                                    <div className="flex flex-wrap items-center gap-2 text-base font-bold text-slate-800">
                                        <span className="text-blue-600 text-sm font-black">最大公因數 (GCD) :</span>
                                        <span className="font-mono">( {numA} , {numB} ) =</span>
                                        {gcdInputs.map((val, idx) => (
                                            <React.Fragment key={idx}>
                                                <input
                                                    type="text" disabled={verified} value={val}
                                                    onChange={(e) => {
                                                        const updated = [...gcdInputs];
                                                        updated[idx] = e.target.value;
                                                        setGcdInputs(updated);
                                                    }}
                                                    onKeyDown={(ev) => handleEnterFocusNext(ev)}
                                                    placeholder="?"
                                                    className="w-10 text-center py-1 border border-slate-200 rounded-lg text-sm bg-slate-50 font-mono focus:outline-none focus:border-blue-500"
                                                />
                                                {idx < gcdInputs.length - 1 && <span className="text-slate-400">×</span>}
                                            </React.Fragment>
                                        ))}
                                        <span>=</span>
                                        <input 
                                            type="text" disabled={verified} value={gcdAns}
                                            onChange={(e) => setGcdAns(e.target.value)}
                                            onKeyDown={(ev) => handleEnterFocusNext(ev)}
                                            placeholder="最後值"
                                            className="w-16 text-center py-1 border border-slate-200 rounded-lg text-sm bg-slate-50 text-indigo-600 font-bold font-mono focus:outline-none focus:border-blue-500"
                                        />
                                    </div>

                                    {/* LCM */}
                                    <div className="flex flex-wrap items-center gap-2 text-base font-bold text-slate-800">
                                        <span className="text-emerald-600 text-sm font-black">最小公倍數 (LCM) :</span>
                                        <span className="font-mono">[ {numA} , {numB} ] =</span>
                                        {lcmInputs.map((val, idx) => (
                                            <React.Fragment key={idx}>
                                                <input
                                                    type="text" disabled={verified} value={val}
                                                    onChange={(e) => {
                                                        const updated = [...lcmInputs];
                                                        updated[idx] = e.target.value;
                                                        setLcmInputs(updated);
                                                    }}
                                                    onKeyDown={(ev) => handleEnterFocusNext(ev)}
                                                    placeholder="?"
                                                    className="w-10 text-center py-1 border border-slate-200 rounded-lg text-sm bg-slate-50 font-mono focus:outline-none focus:border-blue-500"
                                                />
                                                {idx < lcmInputs.length - 1 && <span className="text-slate-400">×</span>}
                                            </React.Fragment>
                                        ))}
                                        <span>=</span>
                                        <input 
                                            type="text" disabled={verified} value={lcmAns}
                                            onChange={(e) => setLcmAns(e.target.value)}
                                            onKeyDown={(ev) => handleEnterFocusNext(ev, 'verify-gcdlcm-btn')}
                                            placeholder="最後值"
                                            className="w-16 text-center py-1 border border-slate-200 rounded-lg text-sm bg-slate-50 text-indigo-600 font-bold font-mono focus:outline-none focus:border-blue-500"
                                        />
                                    </div>
                                </div>

                                {!verified && (
                                    <button 
                                        id="verify-gcdlcm-btn"
                                        type="submit"
                                        className="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold rounded-2xl text-xs active:scale-95 shadow transition-all"
                                    >
                                        驗證 GCD & LCM 結果
                                    </button>
                                )}
                            </form>
                        )}
                    </div>
                    
                    <div className="lg:col-span-4 flex flex-col items-center">
                        <Scratchpad />
                    </div>
                </div>
            );
        }

        // --- 模組五：素養大挑戰 (Quiz) - 真正隨機 PCG 引擎 ---
        function QuizModule() {
            const [questions, setQuestions] = useState([]);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [showExplanation, setShowExplanation] = useState(false);
            const [score, setScore] = useState(0);
            const [quizState, setQuizState] = useState('start'); 
            const [answersRecord, setAnswersRecord] = useState([]);

            const generateQuestions = () => {
                const subjects = ["小智", "農夫老王", "烘焙師莉莉", "小美", "小明", "巧克阿姨", "園丁大叔"];
                const containers = ["籃子", "禮盒", "袋子", "盒子", "紙箱"];
                
                const qList = [
                    // 1. 質因數觀念題
                    (() => {
                        const items = ["蘋果", "草莓", "鉛筆", "水蜜桃"];
                        const sub = subjects[Math.floor(Math.random() * subjects.length)];
                        const item = items[Math.floor(Math.random() * items.length)];
                        
                        // 隨機一個合數
                        const nums = [30, 42, 60, 70, 84];
                        const num = nums[Math.floor(Math.random() * nums.length)];
                        const correctFactors = getPrimeFactors(num);
                        const uniquePrimes = Array.from(new Set(correctFactors));
                        const correct = uniquePrimes[Math.floor(Math.random() * uniquePrimes.length)];
                        
                        // 誘答
                        const wrongPool = [4, 6, 8, 9, 10, 12].filter(n => num % n === 0 && !isPrime(n));
                        const wrong = wrongPool.length >= 3 ? wrongPool.slice(0, 3) : [4, 6, 8];
                        const options = Array.from(new Set([correct, ...wrong])).slice(0, 4);
                        
                        return {
                            title: `${sub} 收集了 ${num} 顆${item}。他想找出這堆${item}的「質數因數（質因數）」來分組，請問下列哪一個數字是 ${num} 的「質因數」？`,
                            options: shuffleArray(options),
                            correct,
                            exp: `${num} 的因數包含：${correctFactors.join(', ')} 等，其中只有質數才叫做質因數。雖然 ${options.filter(o => o !== correct).join(', ')} 是因數，但它們是合數，所以不是質因數。正確答案為 ${correct}。`
                        };
                    })(),
                    
                    // 2. 兩數互質判斷題
                    (() => {
                        const sub = subjects[Math.floor(Math.random() * subjects.length)];
                        
                        // 生成四個選項，一組互質，三組不互質
                        // 互質組
                        const coprimePairs = [[8, 9], [9, 14], [15, 16], [12, 25], [14, 15]];
                        const coprimeSet = coprimePairs[Math.floor(Math.random() * coprimePairs.length)];
                        const correct = `${coprimeSet[0]} 和 ${coprimeSet[1]}`;

                        // 不互質組
                        const nonCoprimePairs = [[6, 8], [15, 20], [12, 18], [14, 21], [10, 25]];
                        const wrongSets = shuffleArray(nonCoprimePairs).slice(0, 3).map(p => `${p[0]} 和 ${p[1]}`);

                        const options = [correct, ...wrongSets];
                        return {
                            title: `${sub} 正在整理圖書館的書籍，需要將書籍分類成兩堆，且這兩堆書籍數量的關係必須是「兩數互質」，請問下列哪一組數量符合這個要求？`,
                            options: shuffleArray(options),
                            correct,
                            exp: `兩數互質代表最大公因數為 1。在 ${correct} 中，這兩個數唯一的公因數是 1，因此互質。其餘的組別都有除了 1 以外的公因數。`
                        };
                    })(),

                    // 3. 最大公因數應用題 (GCD)
                    (() => {
                        const sub = subjects[Math.floor(Math.random() * subjects.length)];
                        const container = containers[Math.floor(Math.random() * containers.length)];
                        const itemsList = [
                            { aName: "水蜜桃", bName: "甜柿", unit: "顆" },
                            { aName: "巧克力", bName: "草莓糖", unit: "包" },
                            { aName: "藍色鉛筆", bName: "紅色鉛筆", unit: "支" }
                        ];
                        const itemObj = itemsList[Math.floor(Math.random() * itemsList.length)];
                        
                        const factor = [6, 8, 12, 16][Math.floor(Math.random() * 4)];
                        const multA = [2, 3, 5][Math.floor(Math.random() * 3)];
                        let multB = [3, 5, 7][Math.floor(Math.random() * 3)];
                        while (multA === multB) {
                            multB = [3, 5, 7][Math.floor(Math.random() * 3)];
                        }
                        
                        const numA = factor * multA;
                        const numB = factor * multB;
                        const correct = factor;
                        
                        const wrong1 = numA + numB; // 直接加
                        const wrong2 = getLCM(numA, numB); // 最小公倍數
                        const wrong3 = Math.max(2, factor - 2); // 錯誤小因子
                        
                        const options = Array.from(new Set([correct, wrong1, wrong2, wrong3])).filter(n => n > 0 && n !== numA);
                        
                        return {
                            title: `${sub} 把收成的 ${numA} ${itemObj.unit}${itemObj.aName}和 ${numB} ${itemObj.unit}${itemObj.bName}裝進${container}，想讓每個${container}裡的兩種物品數量相同且剛好分完。請問最多可以裝成幾個${container}？`,
                            options: shuffleArray(options),
                            correct,
                            exp: `這是最大公因數的經典應用。我們要求 (${numA}, ${numB}) 的最大公因數。短除法分解得到最大公因數為 ${correct}，因此最多可以分裝成 ${correct} 個${container}。`
                        };
                    })(),

                    // 4. 最小公倍數應用題 (LCM)
                    (() => {
                        const sub = subjects[Math.floor(Math.random() * subjects.length)];
                        
                        // 交通班次情境
                        const busTypes = [["甲線公車", "乙線公車"], ["火車區間車", "火車對號車"], ["交通船A", "交通船B"]];
                        const bus = busTypes[Math.floor(Math.random() * busTypes.length)];
                        
                        const intervalA = [8, 12, 15][Math.floor(Math.random() * 3)];
                        let intervalB = [12, 18, 20][Math.floor(Math.random() * 3)];
                        while (intervalA === intervalB) {
                            intervalB = [12, 18, 20][Math.floor(Math.random() * 3)];
                        }
                        
                        const correct = getLCM(intervalA, intervalB);
                        const options = [correct, intervalA + intervalB, intervalA * intervalB, getGCD(intervalA, intervalB)];

                        return {
                            title: `在轉運站中，${sub} 注意到${bus[0]}每 ${intervalA} 分鐘發一班，${bus[1]}每 ${intervalB} 分鐘發一班。若早上 8 點兩班車同時出發，請問最快幾分鐘之後，這兩班車會再次同時發出？`,
                            options: shuffleArray(Array.from(new Set(options))),
                            correct,
                            exp: `下一次同時發車的時間必須是兩班車間隔時間的最小公倍數。求 [${intervalA}, ${intervalB}] 的最小公倍數，算出來是 ${correct} 分鐘。`
                        };
                    })(),

                    // 5. 壞掉的短除法 (Ink Blot)
                    (() => {
                        const div1 = [2, 3][Math.floor(Math.random() * 2)];
                        const div2 = [3, 5][Math.floor(Math.random() * 2)];
                        const lastQuot = [5, 7][Math.floor(Math.random() * 2)];
                        
                        const correct = div1 * div2 * lastQuot;
                        const wrong = [correct + 10, correct - 4, correct * 2, div1 + div2 + lastQuot];

                        return {
                            title: `小華在筆記本上算質因數分解，短除法的最左上角被除數不小心沾上污漬了。只看得出左側兩個除數分別是 ${div1} 和 ${div2}，且最下方的商是 ${lastQuot}。請問原來的被除數是多少？`,
                            options: shuffleArray(Array.from(new Set([correct, ...wrong]))),
                            correct,
                            exp: `短除法連續相除，將最下方的質數商數逆推回去，即為所有連續除數與最底端商的乘積。所以原始數字是：${div1} × ${div2} × ${lastQuot} = ${correct}。`
                        }
                    })()
                ];
                
                setQuestions(qList);
            };

            const handleStartQuiz = () => {
                generateQuestions();
                setCurrentQIndex(0);
                setSelectedOption(null);
                setShowExplanation(false);
                setScore(0);
                setAnswersRecord([]);
                setQuizState('playing');
            };

            const handleOptionClick = (opt) => {
                if (showExplanation) return;
                setSelectedOption(opt);
            };

            const handleVerifyAnswer = () => {
                if (selectedOption === null) return;
                const isCorrect = selectedOption === questions[currentQIndex].correct;
                if (isCorrect) setScore(prev => prev + 20);
                setAnswersRecord([...answersRecord, isCorrect]);
                setShowExplanation(true);
            };

            const handleNextQuestion = () => {
                if (currentQIndex + 1 < questions.length) {
                    setCurrentQIndex(prev => prev + 1);
                    setSelectedOption(null);
                    setShowExplanation(false);
                } else {
                    setQuizState('end');
                }
            };

            return (
                <div className="max-w-2xl mx-auto space-y-6 animate-fade-in">
                    {quizState === 'start' && (
                        <div className="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm text-center space-y-6">
                            <div className="bg-blue-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto text-blue-500">
                                <LucideIcon name="Crown" size={40} className="animate-bounce" />
                            </div>
                            <div className="space-y-2">
                                <h3 className="text-2xl font-black text-slate-800">公因倍數素養挑戰</h3>
                                <p className="text-slate-500 text-sm">挑戰 5 題生活中的最大公因數、最小公倍數與互質素養應用題！每一次都會隨機生成不同的主角、物品與數字喔！</p>
                            </div>
                            <button
                                onClick={handleStartQuiz}
                                className="px-8 py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-2xl font-bold shadow active:scale-95 transition-all"
                            >
                                開始挑戰
                            </button>
                        </div>
                    )}

                    {quizState === 'playing' && questions.length > 0 && (
                        <div className="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm space-y-6">
                            <div className="flex justify-between items-center text-xs font-bold text-slate-400">
                                <span>問題 {currentQIndex + 1} / {questions.length}</span>
                                <span>目前得分: <span className="text-blue-600 text-sm font-black">{score}</span> 分</span>
                            </div>
                            <div className="text-base font-bold text-slate-800 leading-loose">{questions[currentQIndex].title}</div>
                            
                            <div className="grid grid-cols-1 gap-3">
                                {questions[currentQIndex].options.map((opt, idx) => {
                                    const isSelected = selectedOption === opt;
                                    const isCorrectOpt = opt === questions[currentQIndex].correct;
                                    let btnStyle = "bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100";
                                    if (showExplanation) {
                                        if (isCorrectOpt) btnStyle = "bg-emerald-50 border-emerald-300 text-emerald-700 font-bold";
                                        else if (isSelected) btnStyle = "bg-rose-50 border-rose-300 text-rose-700 font-bold";
                                        else btnStyle = "bg-slate-50 border-slate-100 text-slate-300 cursor-not-allowed";
                                    } else if (isSelected) {
                                        btnStyle = "bg-blue-50 border-blue-400 text-blue-700 font-bold";
                                    }
                                    return (
                                        <button
                                            key={idx} disabled={showExplanation} onClick={() => handleOptionClick(opt)}
                                            className={`p-4 rounded-2xl border-2 text-left text-sm transition-all flex items-center justify-between ${btnStyle}`}
                                        >
                                            <span className="font-medium">{opt}</span>
                                            {showExplanation && isCorrectOpt && <span className="text-emerald-500 font-black text-xs">✓ 正確</span>}
                                            {showExplanation && isSelected && !isCorrectOpt && <span className="text-rose-500 font-black text-xs">✗ 答錯</span>}
                                        </button>
                                    );
                                })}
                            </div>

                            {!showExplanation ? (
                                <button
                                    onClick={handleVerifyAnswer} disabled={selectedOption === null}
                                    className={`w-full py-3.5 rounded-2xl font-bold transition-all active:scale-95 ${
                                        selectedOption === null ? 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none' : 'bg-blue-600 text-white'
                                    }`}
                                >
                                    送出回答
                                </button>
                            ) : (
                                <div className="space-y-4 pt-4 border-t border-slate-100">
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                        <span className="text-xs font-bold text-slate-400 block mb-1">🌱 教學詳解</span>
                                        <p className="text-xs text-slate-600 leading-relaxed font-semibold">{questions[currentQIndex].exp}</p>
                                    </div>
                                    <button onClick={handleNextQuestion} className="w-full py-3.5 bg-slate-800 text-white rounded-2xl font-bold active:scale-95">
                                        {currentQIndex + 1 === questions.length ? '觀看總結' : '下一題 ➜'}
                                    </button>
                                </div>
                            )}
                        </div>
                    )}

                    {quizState === 'end' && (
                        <div className="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm text-center space-y-6">
                            <div className="bg-emerald-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto text-emerald-500">
                                <LucideIcon name="Crown" size={40} />
                            </div>
                            <div className="space-y-2">
                                <h3 className="text-2xl font-black text-slate-800">挑戰大成功！</h3>
                                <p className="text-slate-500 text-sm">您的最終得分為：</p>
                                <div className="text-5xl font-black text-blue-600 animate-pulse">{score} <span className="text-lg text-slate-400">分</span></div>
                            </div>
                            <div className="flex justify-center gap-2 max-w-xs mx-auto">
                                {answersRecord.map((res, i) => (
                                    <span key={i} className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs ${
                                        res ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'
                                    }`}>{i + 1}</span>
                                ))}
                            </div>
                            <div className="flex flex-col sm:flex-row gap-3 justify-center pt-4">
                                <button onClick={handleStartQuiz} className="px-6 py-3 bg-blue-600 text-white rounded-2xl font-bold text-sm shadow">再應戰一次</button>
                                <button onClick={() => setQuizState('start')} className="px-6 py-3 bg-slate-100 text-slate-700 rounded-2xl font-bold text-sm">返回主頁</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- 全域 App 元件 ---
        function App() {
            const [activeTab, setActiveTab] = useState('concept'); 

            return (
                <div className="min-h-screen flex flex-col text-slate-800">
                    <header className="bg-white shadow-sm sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-br from-blue-600 to-indigo-600 p-2.5 rounded-2xl text-white shadow-md">
                                    <LucideIcon name="Layers" size={22} />
                                </div>
                                <h1 className="text-lg sm:text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-indigo-500">
                                    質因數分解與公因倍數探險家
                                </h1>
                            </div>
                            <a href="index.html" className="text-xs font-bold text-slate-500 hover:text-blue-600 transition-colors flex items-center gap-1.5">
                                <LucideIcon name="ArrowLeft" size={14} />
                                <span>返回大廳</span>
                            </a>
                        </div>
                    </header>

                    <div className="bg-white border-b border-slate-100 sticky top-16 z-40">
                        <div className="max-w-7xl mx-auto px-4 flex justify-center gap-4 sm:gap-6 overflow-x-auto hide-scrollbar">
                            {[
                                { id: 'concept', label: '認識質因與互質', icon: 'BookOpen' },
                                { id: 'tree', label: '樹狀圖分解', icon: 'Network' },
                                { id: 'lab', label: '短除法實驗室', icon: 'HelpCircle' },
                                { id: 'gcdlcm', label: 'GCD & LCM', icon: 'Percent' },
                                { id: 'quiz', label: '素養大挑戰', icon: 'Crown' }
                            ].map(tab => (
                                <button
                                    key={tab.id} onClick={() => setActiveTab(tab.id)}
                                    className={`py-4 px-2 font-bold text-sm flex items-center gap-1.5 border-b-4 transition-all shrink-0 ${
                                        activeTab === tab.id ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'
                                    }`}
                                >
                                    <LucideIcon name={tab.icon} size={16} />
                                    <span>{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="flex-grow p-4 sm:p-6 lg:p-8 max-w-7xl mx-auto w-full">
                        {activeTab === 'concept' && <ConceptModule />}
                        {activeTab === 'tree' && <FactorTreeModule />}
                        {activeTab === 'lab' && <ShortDivisionModule />}
                        {activeTab === 'gcdlcm' && <GcdLcmModule />}
                        {activeTab === 'quiz' && <QuizModule />}
                    </main>

                    <footer className="text-center py-6 text-slate-400 text-xs border-t border-slate-200 mt-auto bg-white select-none">
                        <span>© 2026 國小數學互動教學實驗室</span>
                    </footer>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
