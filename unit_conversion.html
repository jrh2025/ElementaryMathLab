<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公制單位換算全攻略</title>

    <!-- 載入 Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 載入 React & ReactDOM (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- 載入 Babel 以便在瀏覽器中編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 基礎動畫設定 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .animate-zoom-in {
            animation: zoomIn 0.5s ease-out forwards;
        }

        /* 自訂 Radio 按鈕樣式 */
        .quiz-radio:checked+div {
            border-color: #f59e0b;
            background-color: #fef3c7;
        }
    </style>
</head>

<body class="bg-slate-50 font-sans text-gray-800 selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // === 內建 SVG 圖示元件 ===
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Ruler = (p) => <IconBase {...p}><path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.4 2.4 0 0 1 0-3.4l2.6-2.6a2.4 2.4 0 0 1 3.4 0L21.3 15.3z" /><path d="m14.5 4.5 5 5" /><path d="m10.5 8.5 5 5" /><path d="m6.5 12.5 5 5" /></IconBase>;
        const Square = (p) => <IconBase {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2" /></IconBase>;
        const Box = (p) => <IconBase {...p}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></IconBase>;
        const Droplets = (p) => <IconBase {...p}><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 7.5 7 7.5s-2.29 1.56-3.29 2.56c-1.14.93-1.71 2.03-1.71 3.19C2 14.47 3.8 16.3 6 16.3Z" /><path d="M16 21c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19-.34-.28-.7-.54-1-.77L16 11.5s-2.29 1.56-3.29 2.56c-1.14.93-1.71 2.03-1.71 3.19C11 19.17 12.8 21 15 21Z" /></IconBase>;
        const AlertTriangle = (p) => <IconBase {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></IconBase>;
        const ArrowRight = (p) => <IconBase {...p}><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></IconBase>;
        const ArrowLeft = (p) => <IconBase {...p}><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></IconBase>;
        const CheckCircle2 = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></IconBase>;
        const CalculatorIcon = (p) => <IconBase {...p}><rect width="16" height="20" x="4" y="2" rx="2" /><line x1="8" x2="16" y1="6" y2="6" /><line x1="16" x2="16" y1="14" y2="18" /><path d="M16 10h.01" /><path d="M12 10h.01" /><path d="M8 10h.01" /><path d="M12 14h.01" /><path d="M8 14h.01" /><path d="M12 18h.01" /><path d="M8 18h.01" /></IconBase>;
        const InfoIcon = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10" /><path d="M12 16v-4" /><path d="M12 8h.01" /></IconBase>;
        const MapIcon = (p) => <IconBase {...p}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" /><line x1="9" x2="9" y1="3" y2="18" /><line x1="15" x2="15" y1="6" y2="21" /></IconBase>;
        const BeakerIcon = (p) => <IconBase {...p}><path d="M4.5 3h15" /><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3" /><path d="M6 14h12" /></IconBase>;
        const Target = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></IconBase>;
        const XCircle = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10" /><line x1="15" y1="9" x2="9" y2="15" /><line x1="9" y1="9" x2="15" y2="15" /></IconBase>;
        const TerminalIcon = (p) => <IconBase {...p}><polyline points="4 17 10 11 4 5" /><line x1="12" y1="19" x2="20" y2="19" /></IconBase>;
        const Trash2 = (p) => <IconBase {...p}><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></IconBase>;

        // === UI 共用元件 ===
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-2xl shadow-lg p-6 border border-gray-100 ${className}`}>
                {children}
            </div>
        );

        const SectionTitle = ({ icon: Icon, title, color }) => (
            <div className={`flex items-center gap-3 mb-6 pb-4 border-b-2 ${color}`}>
                <div className={`p-3 rounded-xl text-white ${color.replace('border-', 'bg-')}`}>
                    <Icon size={28} />
                </div>
                <h2 className="text-2xl font-bold text-gray-800">{title}</h2>
            </div>
        );

        // === 第一章：長度 ===
        const LengthChapter = () => {
            const [val, setVal] = useState(1);
            const [unit, setUnit] = useState('m');

            const multipliers = { km: 1000, m: 1, dm: 0.1, cm: 0.01, mm: 0.001 };
            const baseValueInMeters = val * multipliers[unit];

            const macroUnits = [
                { id: 'mm', label: '毫米 (mm)', step: '10倍' },
                { id: 'cm', label: '公分/厘米 (cm)', step: '10倍' },
                { id: 'dm', label: '公寸 (dm)', step: '10倍' },
                { id: 'm', label: '公尺 (m)', step: '1000倍' },
                { id: 'km', label: '公里 (km)', step: null }
            ];

            const microUnits = [
                { id: 'nm', label: '奈米 (nm)', step: '1000倍' },
                { id: 'μm', label: '微米 (μm)', step: '1000倍' },
                { id: 'mm', label: '毫米 (mm)', step: '1000倍' },
                { id: 'm', label: '公尺 (m)', step: null }
            ];

            return (
                <div className="space-y-6 animate-fade-in">
                    <Card>
                        <SectionTitle icon={Ruler} title="一維的基礎：長度 (1D)" color="border-blue-500" />
                        <p className="text-lg text-gray-700 mb-4">
                            長度是所有換算的基礎！在公制系統中，除了微觀世界之外，我們通常以 <strong>10 倍</strong>為進位基準。
                        </p>

                        <div className="mt-12 mb-16 pt-4 pb-12 hidden md:flex items-center w-full relative px-6 bg-blue-50/50 rounded-xl border border-blue-50">
                            <div className="absolute top-2 left-4 text-xs font-bold text-blue-400">💡 點擊圓點可直接進行單位換算</div>
                            {macroUnits.map((u, idx) => (
                                <React.Fragment key={u.id}>
                                    <div
                                        className="flex flex-col items-center cursor-pointer group relative z-10"
                                        onClick={() => { setVal(1); setUnit(u.id); }}
                                    >
                                        <div className={`w-6 h-6 rounded-full mb-2 border-4 border-white shadow transition-all duration-300 ${unit === u.id ? 'bg-orange-500 scale-125 ring-4 ring-orange-200' : 'bg-blue-500 group-hover:bg-blue-400 group-hover:scale-110'}`}></div>
                                        <span className={`text-sm font-bold whitespace-nowrap absolute top-8 transition-colors duration-300 ${unit === u.id ? 'text-orange-600' : 'text-blue-800'}`}>{u.label}</span>
                                    </div>
                                    {idx < macroUnits.length - 1 && (
                                        <div className="flex-1 h-2 bg-blue-200 flex justify-center items-center -mx-1 z-0 relative">
                                            <span className="bg-white text-blue-700 text-xs font-bold px-2 py-0.5 rounded-full shadow border border-blue-100 whitespace-nowrap absolute -top-4">{u.step}</span>
                                        </div>
                                    )}
                                </React.Fragment>
                            ))}
                        </div>

                        <div className="bg-blue-50 p-6 rounded-xl mt-4 border border-blue-100">
                            <h3 className="text-lg font-bold text-blue-800 mb-4 flex items-center gap-2">
                                <CalculatorIcon size={20} /> 互動換算器：輸入數值看看！
                            </h3>
                            <div className="flex flex-wrap items-center gap-4 text-lg">
                                <input
                                    type="number"
                                    value={val}
                                    onChange={e => setVal(Number(e.target.value) || 0)}
                                    className="w-24 p-2 border border-blue-300 rounded-lg text-center font-bold focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                />
                                <select
                                    value={unit}
                                    onChange={e => setUnit(e.target.value)}
                                    className="p-2 border border-blue-300 rounded-lg bg-white font-bold text-blue-800 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                >
                                    <option value="km">公里 (km)</option>
                                    <option value="m">公尺 (m)</option>
                                    <option value="dm">公寸 (dm)</option>
                                    <option value="cm">公分/厘米 (cm)</option>
                                    <option value="mm">毫米 (mm)</option>
                                </select>
                                <span className="font-bold text-gray-500">=</span>
                                <div className="flex flex-col gap-2 bg-white p-4 rounded-lg shadow-sm flex-1 min-w-[200px]">
                                    <div className="font-bold text-gray-800">{+(baseValueInMeters / multipliers['km']).toFixed(6)} <span className="text-gray-500 text-sm">公里 (km)</span></div>
                                    <div className="font-bold text-blue-600 text-xl">{+(baseValueInMeters).toFixed(6)} <span className="text-blue-500 text-sm">公尺 (m)</span></div>
                                    <div className="font-bold text-gray-800">{+(baseValueInMeters / multipliers['cm']).toFixed(6)} <span className="text-gray-500 text-sm">公分/厘米 (cm)</span></div>
                                    <div className="font-bold text-gray-800">{+(baseValueInMeters / multipliers['mm']).toFixed(6)} <span className="text-gray-500 text-sm">毫米 (mm)</span></div>
                                </div>
                            </div>

                            <div className="mt-4 bg-yellow-50 text-yellow-800 p-3 rounded-lg flex items-start gap-2 border border-yellow-200 text-sm">
                                <InfoIcon size={18} className="shrink-0 mt-0.5" />
                                <div>
                                    <span className="font-bold">名詞小百科：</span>在科學界與國際工程標準中，「公分」又常被稱為<strong>「厘米」(Centimeter, cm)</strong>。考試或閱讀科普文章時看到厘米，直接把它當作公分來計算即可！
                                </div>
                            </div>
                        </div>

                        <div className="mt-8 bg-gray-50 p-6 rounded-lg border-l-4 border-teal-500 shadow-sm">
                            <h4 className="font-bold text-teal-800 mb-2 flex items-center gap-2">
                                🔬 微觀長度單位 (跳躍 1000 倍)
                            </h4>
                            <p className="text-sm text-gray-600 mb-6">當進入比毫米更小、肉眼看不見的世界（如細胞、晶片），進位便會改為 <strong>1000 倍</strong>：</p>

                            <div className="my-8 pt-4 pb-8 hidden md:flex items-center w-full relative px-6">
                                {microUnits.map((u, idx) => (
                                    <React.Fragment key={u.id}>
                                        <div className="flex flex-col items-center relative z-10">
                                            <div className="w-5 h-5 bg-teal-500 rounded-full mb-2 border-4 border-white shadow"></div>
                                            <span className="text-xs font-bold whitespace-nowrap absolute top-6 text-teal-800">{u.label}</span>
                                        </div>
                                        {idx < microUnits.length - 1 && (
                                            <div className="flex-1 h-[2px] bg-teal-200 flex justify-center items-center -mx-1 z-0 relative">
                                                <span className="bg-white text-teal-600 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm border border-teal-100 whitespace-nowrap absolute -top-3">{u.step}</span>
                                            </div>
                                        )}
                                    </React.Fragment>
                                ))}
                            </div>

                            <ul className="list-disc list-inside text-sm text-gray-700 font-mono mt-4 space-y-1">
                                <li>1 毫米 (mm) = 1,000 微米 (μm)</li>
                                <li>1 微米 (μm) = 1,000 奈米 (nm)</li>
                                <li className="text-teal-700 font-bold">1 公尺 (m) = 1,000,000,000 (10⁹) 奈米</li>
                            </ul>
                        </div>
                    </Card>
                </div>
            );
        };

        // === 第二章：面積 ===
        const AreaChapter = () => {
            const [mode, setMode] = useState('m2_cm2');
            const [landVal, setLandVal] = useState(1);
            const [landUnit, setLandUnit] = useState('ha');

            const conversions = {
                m2_cm2: {
                    tab: '基本: m² ➜ cm²',
                    desc: '基礎概念：面積是長度的「平方」。長度差 100 倍，面積就差了 100 × 100 = 10,000 倍！',
                    left: { top: '1公尺 (m)', left: '1公尺\n(m)', name: '1 平方公尺\n(m²)' },
                    right: { top: '100公分 (cm)', left: '100公分\n(cm)', calc: '100 × 100\n= 10,000 平方公分\n(cm²)' },
                    gridText: '每個小網格代表 100cm²'
                },
                a_m2: {
                    tab: '土地: 公畝 (a)',
                    desc: '大地主單位之一：【公畝】是邊長為 10公尺 的正方形面積。',
                    left: { top: '10公尺 (m)', left: '10公尺\n(m)', name: '1 公畝\n(a)' },
                    right: { top: '10公尺 (m)', left: '10公尺\n(m)', calc: '10 × 10\n= 100 平方公尺\n(m²)' },
                    gridText: '每個小網格代表 1m²'
                },
                ha_a: {
                    tab: '土地: 公頃 (ha)',
                    desc: '大地主單位之二：【公頃】是邊長為 100公尺 的正方形面積。通常用來衡量校園、公園大小。',
                    left: { top: '100公尺 (m)', left: '100公尺\n(m)', name: '1 公頃\n(ha)' },
                    right: { top: '100公尺 (m)', left: '100公尺\n(m)', calc: '100 × 100 = 10,000 m²\n= 100 公畝\n(a)' },
                    gridText: '每個小網格代表 1a (100m²)'
                },
                km2_ha: {
                    tab: '土地: 平方公里 (km²)',
                    desc: '大地主單位之三：【平方公里】是邊長為 1公里 的正方形面積。通常用來衡量城市、國家的大小。',
                    left: { top: '1000公尺 (m)', left: '1公里\n(km)', name: '1 平方公里\n(km²)' },
                    right: { top: '1000公尺 (m)', left: '1000公尺\n(m)', calc: '1000 × 1000 = 1,000,000 m²\n= 100 公頃\n(ha)' },
                    gridText: '每個小網格代表 1ha'
                }
            };

            const cur = conversions[mode];
            const landMultipliers = { km2: 1000000, ha: 10000, a: 100, m2: 1 };
            const baseAreaInM2 = landVal * landMultipliers[landUnit];

            return (
                <div className="space-y-6 animate-fade-in">
                    <Card>
                        <SectionTitle icon={Square} title="二維的面：面積 (2D)" color="border-green-500" />

                        <div className="mb-4">
                            <h3 className="font-bold text-lg text-gray-800 mb-3">📍 點擊按鈕探索不同面積單位的相對大小：</h3>
                            <div className="flex flex-wrap gap-2 mb-4">
                                {Object.keys(conversions).map(key => (
                                    <button
                                        key={key}
                                        onClick={() => setMode(key)}
                                        className={`px-4 py-2 rounded-lg font-bold transition-all shadow-sm ${mode === key ? 'bg-green-600 text-white ring-2 ring-green-300 scale-105' : 'bg-green-100 text-green-800 hover:bg-green-200'}`}
                                    >
                                        {conversions[key].tab}
                                    </button>
                                ))}
                            </div>
                            <p className="text-gray-600 bg-green-50 p-3 rounded border border-green-100">
                                {cur.desc}
                            </p>
                        </div>

                        <div className="flex flex-col md:flex-row gap-4 md:gap-8 items-center justify-center my-8 p-8 bg-green-50/50 rounded-xl border-2 border-green-100 overflow-x-auto w-full">
                            <div className="flex flex-col items-center">
                                <div className="text-sm font-bold text-gray-600 mb-2">{cur.left.top}</div>
                                <div className="flex items-center">
                                    <div className="text-sm font-bold text-gray-600 mr-3 whitespace-pre-line text-right leading-relaxed">{cur.left.left}</div>
                                    <div className="w-40 h-40 sm:w-48 sm:h-48 bg-green-200 border-2 border-green-500 flex items-center justify-center font-bold text-green-800 shadow-lg whitespace-pre-line text-center text-lg rounded-sm transition-all duration-300">
                                        {cur.left.name}
                                    </div>
                                </div>
                            </div>
                            <div className="text-4xl font-black text-green-500 my-2 md:my-0 drop-shadow-sm mx-4">=</div>
                            <div className="flex flex-col items-center">
                                <div className="text-sm font-bold text-gray-600 mb-2">{cur.right.top}</div>
                                <div className="flex items-center">
                                    <div className="text-sm font-bold text-gray-600 mr-3 whitespace-pre-line text-right leading-relaxed">{cur.right.left}</div>
                                    <div className="w-40 h-40 sm:w-48 sm:h-48 bg-green-100 border-2 border-green-500 grid grid-cols-10 grid-rows-10 shadow-lg relative rounded-sm transition-all duration-300">
                                        {Array.from({ length: 100 }).map((_, i) => (
                                            <div key={i} className="border border-green-600/70"></div>
                                        ))}
                                        <div className="absolute inset-0 flex items-center justify-center font-bold text-green-900 bg-white/70 whitespace-pre-line text-center px-4 leading-relaxed backdrop-blur-[2px]">
                                            {cur.right.calc}
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-4 text-xs text-green-800 font-bold bg-green-200 px-3 py-1 rounded-full shadow-sm">{cur.gridText}</div>
                            </div>
                        </div>

                        <div className="bg-emerald-50 p-6 rounded-xl mt-12 border border-emerald-200 shadow-inner">
                            <h3 className="text-lg font-bold text-emerald-800 mb-4 flex items-center gap-2 border-b border-emerald-200 pb-2">
                                <MapIcon size={22} /> 大地主專用：土地面積圖解換算器
                            </h3>

                            <div className="grid md:grid-cols-2 gap-6">
                                <div className="flex flex-col gap-4 justify-center">
                                    <div className="flex flex-wrap items-center gap-3">
                                        <input
                                            type="number"
                                            value={landVal}
                                            onChange={e => setLandVal(Number(e.target.value) || 0)}
                                            className="w-32 p-3 border border-emerald-300 rounded-lg text-center font-bold focus:ring-2 focus:ring-emerald-500 focus:outline-none shadow-sm text-lg"
                                        />
                                        <select
                                            value={landUnit}
                                            onChange={e => setLandUnit(e.target.value)}
                                            className="p-3 border border-emerald-300 rounded-lg bg-white font-bold text-emerald-800 focus:ring-2 focus:ring-emerald-500 focus:outline-none shadow-sm text-lg"
                                        >
                                            <option value="km2">平方公里 (km²)</option>
                                            <option value="ha">公頃 (ha)</option>
                                            <option value="a">公畝 (a)</option>
                                            <option value="m2">平方公尺 (m²)</option>
                                        </select>
                                    </div>
                                    <div className="flex justify-center md:justify-start pl-8 text-emerald-500 font-black text-2xl">⬇️ 換算為</div>
                                    <div className="flex flex-col gap-2 bg-white p-5 rounded-lg shadow-md border border-emerald-100">
                                        <div className="font-bold text-gray-800 text-lg">{+(baseAreaInM2 / 1000000).toFixed(6)} <span className="text-gray-500 text-sm">平方公里 (km²)</span></div>
                                        <div className="font-bold text-emerald-600 text-2xl">{+(baseAreaInM2 / 10000).toFixed(6)} <span className="text-emerald-500 text-base">公頃 (ha)</span></div>
                                        <div className="font-bold text-gray-800 text-lg">{+(baseAreaInM2 / 100).toFixed(6)} <span className="text-gray-500 text-sm">公畝 (a)</span></div>
                                        <div className="font-bold text-gray-800 text-lg">{+(baseAreaInM2).toFixed(6)} <span className="text-gray-500 text-sm">平方公尺 (m²)</span></div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-lg p-5 border-2 border-emerald-100 flex flex-col justify-center">
                                    <h4 className="font-bold text-emerald-800 mb-3 text-center">💡 進位秘訣：都是 100 倍！</h4>
                                    <ul className="space-y-4 font-mono text-base bg-emerald-50 p-4 rounded text-emerald-900">
                                        <li className="flex justify-between border-b border-emerald-200 pb-2">
                                            <span>1 平方公里 (km²)</span> <span>= <strong>100</strong> 公頃 (ha)</span>
                                        </li>
                                        <li className="flex justify-between border-b border-emerald-200 pb-2">
                                            <span>1 公頃 (ha)</span> <span>= <strong>100</strong> 公畝 (a)</span>
                                        </li>
                                        <li className="flex justify-between">
                                            <span>1 公畝 (a)</span> <span>= <strong>100</strong> 平方公尺 (m²)</span>
                                        </li>
                                    </ul>
                                    <div className="mt-4 text-center text-sm font-bold text-emerald-700">
                                        ⚠️ 注意跳級考題：<br />1 公頃 (ha) = 10,000 平方公尺 (m²)
                                    </div>
                                </div>
                            </div>
                        </div>
                    </Card>
                </div>
            );
        };

        // === 第三章：體積與容積 ===
        const SVGCube = ({ length, width, height, calc, label, colorCls }) => (
            <div className="flex flex-col items-center mx-1 md:mx-4 my-4">
                <svg viewBox="0 0 240 240" className="w-48 h-48 sm:w-56 sm:h-56 drop-shadow-md overflow-visible">
                    <polygon points="40,80 160,80 200,40 80,40" className={`${colorCls.top} ${colorCls.stroke} stroke-[3px]`} strokeLinejoin="round" />
                    <polygon points="160,80 200,40 200,160 160,200" className={`${colorCls.right} ${colorCls.stroke} stroke-[3px]`} strokeLinejoin="round" />
                    <polygon points="40,80 160,80 160,200 40,200" className={`${colorCls.front} ${colorCls.stroke} stroke-[3px]`} strokeLinejoin="round" />
                    <text x="100" y="225" textAnchor="middle" className="text-[15px] font-bold fill-gray-700">長: {length}</text>
                    <text x="15" y="145" textAnchor="middle" className="text-[15px] font-bold fill-gray-700">高: {height}</text>
                    <text x="185" y="30" textAnchor="middle" className="text-[15px] font-bold fill-gray-700">寬: {width}</text>
                    <text x="100" y="135" textAnchor="middle" className={`text-lg font-bold ${colorCls.text}`}>
                        {calc.split('\n').map((line, i) => (
                            <tspan x="100" dy={i === 0 ? 0 : 28} key={i}>{line}</tspan>
                        ))}
                    </text>
                </svg>
                <div className={`mt-2 font-bold px-4 py-1 rounded-full shadow-sm text-center ${colorCls.badge}`}>{label}</div>
            </div>
        );

        const VolumeChapter = () => {
            const [volMode, setVolMode] = useState('m3_cm3');
            const [volVal, setVolVal] = useState(1);
            const [volUnit, setVolUnit] = useState('m3');

            const volConversions = {
                m3_cm3: {
                    tab: '巨觀體積: m³ ➜ cm³',
                    desc: '體積是長度的「立方」(長×寬×高)。長度相差 100 倍，體積就相差了 100 × 100 × 100 = 1,000,000 (一百萬) 倍！',
                    left: { length: '1m', width: '1m', height: '1m', calc: '1 × 1 × 1\n= 1 m³', label: '1 立方公尺', color: { front: 'fill-purple-200', top: 'fill-purple-100', right: 'fill-purple-300', stroke: 'stroke-purple-500', text: 'fill-purple-900', badge: 'bg-purple-100 text-purple-800 border border-purple-300' } },
                    right: { length: '100cm', width: '100cm', height: '100cm', calc: '100 × 100 × 100\n= 1,000,000 cm³', label: '100萬 立方公分', color: { front: 'fill-indigo-200', top: 'fill-indigo-100', right: 'fill-indigo-300', stroke: 'stroke-indigo-500', text: 'fill-indigo-900', badge: 'bg-indigo-100 text-indigo-800 border border-indigo-300' } }
                },
                cm3_mm3: {
                    tab: '微小體積: cm³ ➜ mm³',
                    desc: '1 公分等於 10 毫米。長度相差 10 倍，體積就相差了 10 × 10 × 10 = 1,000 倍！',
                    left: { length: '1cm', width: '1cm', height: '1cm', calc: '1 × 1 × 1\n= 1 cm³', label: '1 立方公分', color: { front: 'fill-indigo-200', top: 'fill-indigo-100', right: 'fill-indigo-300', stroke: 'stroke-indigo-500', text: 'fill-indigo-900', badge: 'bg-indigo-100 text-indigo-800 border border-indigo-300' } },
                    right: { length: '10mm', width: '10mm', height: '10mm', calc: '10 × 10 × 10\n= 1,000 mm³', label: '1000 立方毫米', color: { front: 'fill-pink-200', top: 'fill-pink-100', right: 'fill-pink-300', stroke: 'stroke-pink-500', text: 'fill-pink-900', badge: 'bg-pink-100 text-pink-800 border border-pink-300' } }
                },
                l_ml: {
                    tab: '常見容積: 公升 ➜ 毫升',
                    desc: '容積用來衡量液體大小。1 公升 (L) 水壺的容量，等於 1,000 個 1 毫升 (ml) 的小水滴！',
                    left: { length: '10cm', width: '10cm', height: '10cm', calc: '內部體積: 1000 cm³\n= 1 公升 (L)', label: '1 公升 (L)', color: { front: 'fill-blue-200', top: 'fill-blue-100', right: 'fill-blue-300', stroke: 'stroke-blue-500', text: 'fill-blue-900', badge: 'bg-blue-100 text-blue-800 border border-blue-300' } },
                    right: { length: '1cm', width: '1cm', height: '1cm', calc: '內部體積: 1 cm³\n= 1 毫升 (ml)', label: '1 毫升(ml) / cc\n(需乘以 1000)', color: { front: 'fill-cyan-200', top: 'fill-cyan-100', right: 'fill-cyan-300', stroke: 'stroke-cyan-500', text: 'fill-cyan-900', badge: 'bg-cyan-100 text-cyan-800 border border-cyan-300' } }
                }
            };
            const curVol = volConversions[volMode];

            const volMultipliers = { m3: 1000000, kl: 1000000, L: 1000, cm3: 1, ml: 1 };
            const baseVolInCm3 = volVal * volMultipliers[volUnit];

            return (
                <div className="space-y-6 animate-fade-in">
                    <Card>
                        <SectionTitle icon={Box} title="三維的空間：體積與容積 (3D)" color="border-purple-500" />

                        <div className="mb-4">
                            <h3 className="font-bold text-lg text-gray-800 mb-3">📍 點擊按鈕探索不同體積與容積單位的倍率變化：</h3>
                            <div className="flex flex-wrap gap-2 mb-4">
                                {Object.keys(volConversions).map(key => (
                                    <button
                                        key={key}
                                        onClick={() => setVolMode(key)}
                                        className={`px-4 py-2 rounded-lg font-bold transition-all shadow-sm ${volMode === key ? 'bg-purple-600 text-white ring-2 ring-purple-300 scale-105' : 'bg-purple-100 text-purple-800 hover:bg-purple-200'}`}
                                    >
                                        {volConversions[key].tab}
                                    </button>
                                ))}
                            </div>
                            <p className="text-gray-600 bg-purple-50 p-3 rounded border border-purple-100">
                                {curVol.desc}
                            </p>
                        </div>

                        <div className="flex flex-col md:flex-row gap-0 md:gap-4 items-center justify-center my-8 p-4 sm:p-8 bg-purple-50/50 rounded-xl border-2 border-purple-100 overflow-x-hidden w-full">
                            <SVGCube {...curVol.left} colorCls={curVol.left.color} />
                            <div className="text-4xl font-black text-purple-500 my-2 md:my-0 drop-shadow-sm mx-2">=</div>
                            <SVGCube {...curVol.right} colorCls={curVol.right.color} />
                        </div>

                        <div className="bg-indigo-50 p-6 rounded-xl mt-12 border border-indigo-200 shadow-inner">
                            <h3 className="text-lg font-bold text-indigo-800 mb-4 flex items-center gap-2 border-b border-indigo-200 pb-2">
                                <BeakerIcon size={22} /> 空間魔法：體積與容積換算器
                            </h3>

                            <div className="grid md:grid-cols-2 gap-6">
                                <div className="flex flex-col gap-4 justify-center">
                                    <div className="flex flex-wrap items-center gap-3">
                                        <input
                                            type="number"
                                            value={volVal}
                                            onChange={e => setVolVal(Number(e.target.value) || 0)}
                                            className="w-32 p-3 border border-indigo-300 rounded-lg text-center font-bold focus:ring-2 focus:ring-indigo-500 focus:outline-none shadow-sm text-lg"
                                        />
                                        <select
                                            value={volUnit}
                                            onChange={e => setVolUnit(e.target.value)}
                                            className="p-3 border border-indigo-300 rounded-lg bg-white font-bold text-indigo-800 focus:ring-2 focus:ring-indigo-500 focus:outline-none shadow-sm text-lg"
                                        >
                                            <option value="m3">立方公尺 (m³)</option>
                                            <option value="kl">公秉 (kl)</option>
                                            <option value="L">公升 (L)</option>
                                            <option value="cm3">立方公分 (cm³)</option>
                                            <option value="ml">毫升/cc (ml)</option>
                                        </select>
                                    </div>
                                    <div className="flex justify-center md:justify-start pl-8 text-indigo-500 font-black text-2xl">⬇️ 換算為</div>
                                    <div className="flex flex-col gap-2 bg-white p-5 rounded-lg shadow-md border border-indigo-100">
                                        <div className="font-bold text-gray-800 text-lg">{+(baseVolInCm3 / 1000000).toFixed(6)} <span className="text-gray-500 text-sm">立方公尺 (m³) / 公秉 (kl)</span></div>
                                        <div className="font-bold text-indigo-600 text-2xl">{+(baseVolInCm3 / 1000).toFixed(6)} <span className="text-indigo-500 text-base">公升 (L)</span></div>
                                        <div className="font-bold text-gray-800 text-lg">{+(baseVolInCm3).toFixed(6)} <span className="text-gray-500 text-sm">立方公分 (cm³) / 毫升 (ml) / c.c.</span></div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-lg p-5 border-2 border-indigo-100 flex flex-col justify-center">
                                    <h4 className="font-bold text-indigo-800 mb-3 text-center">💡 容積進位秘訣：都是 1000 倍！</h4>
                                    <ul className="space-y-4 font-mono text-base bg-indigo-50 p-4 rounded text-indigo-900">
                                        <li className="flex justify-between border-b border-indigo-200 pb-2">
                                            <span>1 公秉 (kl)</span> <span>= <strong>1000</strong> 公升 (L)</span>
                                        </li>
                                        <li className="flex justify-between">
                                            <span>1 公升 (L)</span> <span>= <strong>1000</strong> 毫升 (ml)</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div className="bg-purple-50 rounded-2xl p-6 mt-12 border-2 border-purple-300 shadow-md relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-400 via-pink-500 to-blue-500"></div>
                            <h3 className="text-xl font-bold text-purple-800 mb-6 text-center flex items-center justify-center gap-2">
                                🌟 數學考試必考：體積與容積的互換橋樑
                            </h3>
                            <div className="grid md:grid-cols-3 gap-6">
                                <div className="bg-white p-4 rounded-xl shadow-sm flex flex-col items-center text-center hover:-translate-y-1 transition-transform">
                                    <div className="w-12 h-12 bg-gray-200 border-2 border-gray-400 mb-3 flex items-center justify-center font-bold text-xs">1cm³</div>
                                    <div className="text-purple-500 my-2 text-sm">⬇️ 裝入液體</div>
                                    <Droplets className="text-blue-400 mb-2" size={32} />
                                    <div className="font-bold text-lg">1 立方公分 (cm³)</div>
                                    <div className="text-gray-500 my-1">=</div >
                                    <div className="font-bold text-lg text-blue-600">1 毫升 (ml) / c.c.</div>
                                </div>
                                <div className="bg-white p-4 rounded-xl shadow-md flex flex-col items-center text-center border-2 border-purple-300 md:transform md:scale-105 z-10">
                                    <div className="absolute -top-3 bg-purple-500 text-white text-xs px-3 py-1 rounded-full font-bold shadow">最常考</div>
                                    <div className="w-20 h-20 bg-gray-200 border-2 border-gray-400 mb-3 flex items-center justify-center font-bold text-sm">1000cm³</div>
                                    <div className="text-purple-500 my-2 text-sm">⬇️ 裝入液體</div>
                                    <div className="w-16 h-20 bg-blue-100 border-2 border-blue-400 rounded-b-lg mb-2 flex items-end"><div className="w-full h-3/4 bg-blue-400 rounded-b-sm"></div></div>
                                    <div className="font-bold text-lg">1000 立方公分</div>
                                    <div className="text-gray-500 my-1">=</div >
                                    <div className="font-bold text-xl text-blue-600">1 公升 (L)</div>
                                </div>
                                <div className="bg-white p-4 rounded-xl shadow-sm flex flex-col items-center text-center hover:-translate-y-1 transition-transform">
                                    <div className="w-24 h-24 bg-gray-200 border-2 border-gray-400 mb-3 flex items-center justify-center font-bold text-lg">1m³</div>
                                    <div className="text-purple-500 my-2 text-sm">⬇️ 裝入液體</div>
                                    <div className="w-20 h-24 bg-blue-100 border-2 border-blue-400 rounded-lg mb-2 flex items-end"><div className="w-full h-4/5 bg-blue-500 rounded-b-md"></div></div>
                                    <div className="font-bold text-lg">1 立方公尺 (m³)</div>
                                    <div className="text-gray-500 my-1">=</div >
                                    <div className="font-bold text-lg text-blue-600">1 公秉 (kl) = 1000L</div>
                                </div>
                            </div>
                        </div>
                    </Card>
                </div>
            );
        };

        // === 第四章：陷阱與總結 ===
        const TrapChapter = () => {
            const [outerW, setOuterW] = useState(20);
            const [outerH, setOuterH] = useState(15);
            const [thickness, setThickness] = useState(2);
            const [hasLid, setHasLid] = useState(false);

            const innerW = Math.max(0, outerW - thickness * 2);
            const innerH = Math.max(0, outerH - thickness * (hasLid ? 2 : 1));

            return (
                <div className="space-y-6 animate-fade-in">
                    <Card>
                        <SectionTitle icon={AlertTriangle} title="終極考驗：體積 vs 容積陷阱" color="border-orange-500" />

                        <div className="grid md:grid-cols-2 gap-8">
                            <div>
                                <h3 className="text-xl font-bold text-orange-800 mb-4">名詞大不同</h3>
                                <ul className="space-y-4">
                                    <li className="flex items-start gap-3 bg-gray-50 p-3 rounded-lg">
                                        <Box className="text-gray-600 shrink-0 mt-1" />
                                        <div>
                                            <strong className="text-lg">體積</strong>
                                            <p className="text-gray-600">物體「外部」所佔的空間大小。</p>
                                        </div>
                                    </li>
                                    <li className="flex items-start gap-3 bg-blue-50 p-3 rounded-lg">
                                        <Droplets className="text-blue-500 shrink-0 mt-1" />
                                        <div>
                                            <strong className="text-lg text-blue-800">容積</strong>
                                            <p className="text-gray-600">容器「內部」可容納的空間大小。</p>
                                        </div>
                                    </li>
                                </ul>

                                <div className="mt-6 bg-orange-50 p-4 rounded-xl border border-orange-200">
                                    <h4 className="font-bold text-orange-800 flex items-center gap-2 mb-2">
                                        <AlertTriangle size={20} /> 計算陷阱：記得扣除厚度！
                                    </h4>
                                    <p className="font-mono text-sm space-y-2">
                                        內部長度 = 外部長度 - (厚度 × 2)<br />
                                        內部高度(無蓋) = 外部高度 - (厚度 × 1)<br />
                                        內部高度(有蓋) = 外部高度 - (厚度 × 2)
                                    </p>
                                </div>
                            </div>

                            {/* 互動模擬計算機 */}
                            <div className="bg-white border-2 border-orange-200 rounded-xl p-5 shadow-inner">
                                <h4 className="font-bold text-center text-gray-800 mb-4">互動模擬：剖面圖計算機</h4>

                                <div className="space-y-4 mb-6">
                                    <div className="flex items-center justify-between">
                                        <label className="text-sm font-bold text-gray-600">外部寬度 (cm): {outerW}</label>
                                        <input type="range" min="10" max="50" value={outerW} onChange={e => setOuterW(Number(e.target.value))} className="w-1/2 accent-orange-500" />
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <label className="text-sm font-bold text-gray-600">外部高度 (cm): {outerH}</label>
                                        <input type="range" min="10" max="50" value={outerH} onChange={e => setOuterH(Number(e.target.value))} className="w-1/2 accent-orange-500" />
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <label className="text-sm font-bold text-orange-600">木板厚度 (cm): {thickness}</label>
                                        <input type="range" min="1" max="10" value={thickness} onChange={e => setThickness(Number(e.target.value))} className="w-1/2 accent-orange-500" />
                                    </div>
                                    <div className="flex items-center justify-between bg-orange-100 p-2 rounded">
                                        <label className="text-sm font-bold text-orange-800 cursor-pointer flex items-center gap-2 w-full">
                                            <input type="checkbox" checked={hasLid} onChange={e => setHasLid(e.target.checked)} className="w-5 h-5 accent-orange-600" />
                                            容器是否有蓋子？
                                        </label>
                                    </div>
                                </div>

                                <div className="relative w-full h-48 bg-gray-50 border rounded flex items-center justify-center overflow-hidden p-4 mt-4">
                                    <div
                                        className="relative bg-orange-800 flex items-end justify-center transition-all duration-300"
                                        style={{ width: `${outerW * 4}px`, height: `${outerH * 4}px` }}
                                    >
                                        <div className="absolute -top-5 text-[10px] font-bold text-gray-600 w-full text-center border-t border-gray-400">外寬 {outerW}</div>
                                        <div className="absolute -left-10 text-[10px] font-bold text-gray-600 h-full flex items-center border-l border-gray-400 ml-2 whitespace-nowrap">外高 {outerH}</div>

                                        <div
                                            className={`bg-blue-100 border-dashed border-2 border-blue-400 flex items-center justify-center transition-all duration-300 relative ${!hasLid ? 'rounded-t-none border-t-0' : ''}`}
                                            style={{
                                                width: `${innerW * 4}px`,
                                                height: `${innerH * 4}px`,
                                                marginBottom: `${thickness * 4}px`,
                                                marginTop: hasLid ? `${thickness * 4}px` : '0'
                                            }}
                                        >
                                            <div className="text-center">
                                                <span className="text-[10px] sm:text-xs text-blue-800 font-bold block">內寬: {innerW}</span>
                                                <span className="text-[10px] sm:text-xs text-blue-800 font-bold block">內高: {innerH}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="mt-8 bg-gray-800 text-white p-6 rounded-xl text-center">
                            <h3 className="text-xl font-bold mb-4 flex items-center justify-center gap-2">
                                <CheckCircle2 className="text-green-400" /> 換算終極心法
                            </h3>
                            <div className="flex flex-col sm:flex-row justify-center gap-4 sm:gap-8 text-lg font-bold">
                                <div className="bg-gray-700 px-6 py-3 rounded-lg">大單位 ➔ 小單位 : <span className="text-yellow-400">用乘法 (×)</span><br /><span className="text-sm font-normal text-gray-400">例: 1m → 100cm</span></div>
                                <div className="bg-gray-700 px-6 py-3 rounded-lg">小單位 ➔ 大單位 : <span className="text-yellow-400">用除法 (÷)</span><br /><span className="text-sm font-normal text-gray-400">例: 1000ml → 1L</span></div>
                            </div>
                        </div>
                    </Card>
                </div>
            );
        };

        // === 數位計算紙模組 (CLI風格) ===
        const Scratchpad = () => {
            const [history, setHistory] = useState([]);
            const [input, setInput] = useState('');
            const endRef = React.useRef(null);

            // 自動捲動到底部
            useEffect(() => {
                endRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [history]);

            const calculate = (expr) => {
                if (!expr.trim()) return;

                // 數學解析器預處理
                let parsedExpr = expr
                    .replace(/[xX×]/g, '*')                // 攔截 x, X, × 轉為 JS 乘號 * (修正原指令列的 \)
                    .replace(/(\d+(?:\.\d+)?)%/g, '($1/100)') // 轉換百分比 N% 為 (N/100)
                    .replace(/\^/g, '**')                  // 轉換次方 ^ 為 JS 的 **
                    .replace(/(pi|π)/gi, '3.14')           // 轉換常數 pi
                    .replace(/sqrt/gi, 'Math.sqrt');       // 轉換開根號函數

                try {
                    // 安全隔離執行運算
                    const result = new Function('return ' + parsedExpr)();
                    if (typeof result !== 'number' || isNaN(result)) throw new Error("無效運算");

                    // 防範 JavaScript 浮點數精度問題 (四捨五入至小數第四位)
                    const rounded = Math.round(result * 10000) / 10000;
                    setHistory(prev => [...prev, { id: Date.now().toString(), expr: expr, result: rounded }]);
                } catch (err) {
                    setHistory(prev => [...prev, { id: Date.now().toString(), expr: expr, result: 'Error' }]);
                }
                setInput('');
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    calculate(input);
                }
            };

            const removeItem = (id) => {
                setHistory(prev => prev.filter(item => item.id !== id));
            };

            const clearAll = () => {
                setHistory([]);
            };

            return (
                <div className="bg-gray-900 rounded-xl overflow-hidden shadow-2xl border border-gray-700 flex flex-col h-[300px] lg:h-[450px] w-full">
                    {/* Header */}
                    <div className="bg-gray-800 px-4 py-3 flex justify-between items-center border-b border-gray-700">
                        <div className="flex items-center gap-2 text-gray-300 font-mono text-sm font-bold tracking-wider">
                            <TerminalIcon size={16} className="text-green-400" />
                            數位計算紙
                        </div>
                        <button onClick={clearAll} className="text-gray-500 hover:text-red-400 transition-colors" title="清除全部">
                            <Trash2 size={16} />
                        </button>
                    </div>

                    {/* History */}
                    <div className="flex-1 overflow-y-auto p-4 space-y-3 font-mono text-sm">
                        {history.length === 0 ? (
                            <div className="text-gray-500 italic text-center mt-10">
                                準備就緒。支援：<br />+ - × / ( )<br />^ (次方), % (百分比)<br />sqrt() (開根號), pi, π
                            </div>
                        ) : (
                            history.map((item) => (
                                <div key={item.id} className="group flex justify-between items-start bg-gray-800/50 p-2 rounded transition-colors hover:bg-gray-800">
                                    <div className="flex-1 overflow-hidden pr-2">
                                        <div className="text-gray-400 truncate">{"> " + item.expr}</div>
                                        <div className={`text-lg font-bold tracking-wider ${item.result === 'Error' ? 'text-red-400' : 'text-green-400'}`}>
                                            {item.result}
                                        </div>
                                    </div>
                                    <button onClick={() => removeItem(item.id)} className="text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity p-1 shrink-0" title="刪除此行">
                                        <XCircle size={14} />
                                    </button>
                                </div>
                            ))
                        )}
                        <div ref={endRef} />
                    </div>

                    {/* Input */}
                    <div className="p-3 bg-gray-800 border-t border-gray-700">
                        <div className="flex items-center gap-2 bg-gray-900 rounded border border-gray-600 px-3 py-2 focus-within:border-green-500 transition-colors shadow-inner">
                            <span className="text-green-400 font-mono font-bold animate-pulse">{">"}</span>
                            <input
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={handleKeyDown}
                                placeholder="輸入算式後按 Enter"
                                className="bg-transparent border-none outline-none text-green-100 font-mono w-full text-sm placeholder-gray-600 tracking-wider"
                                autoComplete="off"
                                spellCheck="false"
                            />
                        </div>
                    </div>
                </div>
            );
        };

        // === 第五章：自我挑戰單元 (動態隨機題庫) ===
        const QuizChapter = () => {
            const [quizState, setQuizState] = useState('start'); // 'start', 'playing', 'result'
            const [questions, setQuestions] = useState([]);
            const [userAnswers, setUserAnswers] = useState({});
            const [score, setScore] = useState(0);

            const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
            const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);

            const generateQuestions = () => {
                const newQuestions = [];

                // 1. 基本題型
                const q1Type = randInt(1, 3);
                let q1 = { category: '基本題型', type: 'basic' };
                if (q1Type === 1) {
                    const km = randInt(2, 15);
                    const ans = km * 1000;
                    q1.q = `${km} 公里 = ________ 公尺？`;
                    q1.options = shuffleArray([ans, ans * 10, ans / 10, ans / 100]);
                    q1.ans = ans;
                    q1.exp = `1 公里 = 1000 公尺，所以 ${km} × 1000 = ${ans} 公尺。大單位換小單位用乘法。`;
                } else if (q1Type === 2) {
                    const ha = randInt(2, 20);
                    const ans = ha * 10000;
                    q1.q = `${ha} 公頃 = ________ 平方公尺？`;
                    q1.options = shuffleArray([ans, ans / 100, ans * 100, ans / 10]);
                    q1.ans = ans;
                    q1.exp = `1 公頃 = 10,000 平方公尺，所以 ${ha} × 10,000 = ${ans} 平方公尺。`;
                } else {
                    const kl = randInt(2, 9) + (randInt(1, 9) / 10);
                    const ans = kl * 1000;
                    q1.q = `${kl} 公秉 = ________ 公升？`;
                    q1.options = shuffleArray([ans, ans * 100, ans / 100, ans * 10]);
                    q1.ans = ans;
                    q1.exp = `1 公秉 = 1000 公升，所以 ${kl} × 1000 = ${ans} 公升。`;
                }
                newQuestions.push(q1);

                // 2. 生活應用題型
                const q2Type = randInt(1, 2);
                let q2 = { category: '生活應用題型', type: 'application' };
                if (q2Type === 1) {
                    const L = randInt(2, 5);
                    const W = randInt(1, 2);
                    const D = randInt(3, 8) * 10;
                    const ans = L * W * (D / 100);
                    q2.q = `有一個長 ${L} 公尺、寬 ${W} 公尺、深 ${D} 公分的小沙坑，如果要填滿細沙，需要多少立方公尺的沙子？`;
                    q2.options = shuffleArray([ans, ans * 10, ans * 100, ans / 10]);
                    q2.ans = ans;
                    q2.exp = `計算體積前要先統一單位！深度 ${D} 公分 = ${D / 100} 公尺。體積 = ${L} × ${W} × ${D / 100} = ${ans} 立方公尺。`;
                } else {
                    const L = randInt(1, 2);
                    const V = randInt(3, 8) * 100;
                    const ans = V / (L * L * 10);
                    q2.q = `一個內部底面是邊長 ${L} 公尺正方形的水槽，放入 ${V} 公升的水。請問水深是多少公分？`;
                    q2.options = shuffleArray([ans, ans * 10, ans * 100, ans / 10]);
                    q2.ans = ans;
                    q2.exp = `水槽底面積 = ${L * 100}cm × ${L * 100}cm = ${L * L * 10000} 平方公分。水量 ${V} 公升 = ${V * 1000} 立方公分(cm³)。水深 = 體積 ÷ 底面積 = ${V * 1000} ÷ ${L * L * 10000} = ${ans} 公分。`;
                }
                newQuestions.push(q2);

                // 3. 進階題型
                const q3Type = randInt(1, 2);
                let q3 = { category: '進階題型', type: 'advanced' };
                if (q3Type === 1) {
                    const hasLid = Math.random() > 0.5;
                    const outL = randInt(12, 20) * 2;
                    const outW = randInt(7, 12) * 2;
                    const outH = randInt(10, 15);
                    const t = randInt(1, 2);
                    const inL = outL - t * 2;
                    const inW = outW - t * 2;
                    const inH = outH - (hasLid ? t * 2 : t * 1);
                    const ans = inL * inW * inH;
                    q3.q = `有一個「${hasLid ? '有蓋' : '無蓋'}」的木盒，外部長 ${outL} cm、寬 ${outW} cm、高 ${outH} cm，木板厚度為 ${t} cm。請問這個木盒的容積是多少立方公分？`;
                    q3.options = shuffleArray([ans, outL * outW * outH, (outL - t * 2) * (outW - t * 2) * (outH - t * 2), (outL - t) * (outW - t) * (outH - t)]);
                    q3.options = [...new Set(q3.options)];
                    while (q3.options.length < 4) q3.options.push(q3.options[0] + randInt(10, 100));
                    q3.options = shuffleArray(q3.options);
                    q3.ans = ans;
                    q3.exp = `計算容積要扣除厚度！內部尺寸：長=${outL}-(${t}×2)=${inL}，寬=${outW}-(${t}×2)=${inW}，高=${outH}-(${t}×${hasLid ? 2 : 1})=${inH} (因為${hasLid ? '有蓋扣上下兩片' : '無蓋只扣一片底板'})。容積 = ${inL}×${inW}×${inH} = ${ans} cm³。`;
                } else {
                    const areaA = (randInt(5, 20) / 10);
                    const partArea = randInt(2, 5) * 5;
                    const ans = (areaA * 100) / partArea;
                    q3.q = `小明有一張面積 ${areaA} 公畝的土地，請問這張土地可以分割成多少個 ${partArea} 平方公尺的小區塊？`;
                    q3.options = shuffleArray([ans, ans * 100, ans / 100, ans / 10]);
                    q3.ans = ans;
                    q3.exp = `1 公畝 = 100 平方公尺。所以總面積為 ${areaA} × 100 = ${areaA * 100} 平方公尺。可以分割成：${areaA * 100} ÷ ${partArea} = ${ans} 個區塊。`;
                }
                newQuestions.push(q3);

                // 4. 素養題型
                const q4Type = randInt(1, 2);
                let q4 = { category: '素養題型', type: 'literacy' };
                if (q4Type === 1) {
                    const L = randInt(4, 8) * 10;
                    const W = randInt(3, 5) * 10;
                    const H = randInt(2, 4) * 10;
                    const volCm3 = L * W * H;
                    const volL = volCm3 / 1000;
                    const ans = volL;
                    q4.q = `一個內部長 ${L} cm、寬 ${W} cm、高 ${H} cm 的水族箱裝滿水。已知 1 公升的水大約重 1 公斤，請問水族箱裡的水總重量是多少公斤？`;
                    q4.options = shuffleArray([ans, volCm3, volL * 10, volL / 10]);
                    q4.ans = ans;
                    q4.exp = `內部體積 = ${L} × ${W} × ${H} = ${volCm3} 立方公分(cm³)。橋樑轉換：1000 cm³ = 1 公升，所以容積是 ${volL} 公升。又 1 公升水重 1 公斤，總重即為 ${ans} 公斤。`;
                } else {
                    const hairU = randInt(4, 8) * 10;
                    const targetCm = randInt(2, 8) / 10;
                    const targetU = targetCm * 10000;
                    const ans = targetU / hairU;
                    q4.q = `一根頭髮的直徑約為 ${hairU} 微米(μm)，請問多少根頭髮緊密排在一起，寬度才會達到 ${targetCm} 釐米(公分)？`;
                    q4.options = shuffleArray([ans, ans * 10, ans / 10, ans / 100]);
                    q4.ans = ans;
                    q4.exp = `釐米就是公分！1 公分 = 10 毫米 = 10,000 微米。目標寬度 ${targetCm} 公分 = ${targetCm} × 10,000 = ${targetU} 微米。所需根數 = ${targetU} ÷ ${hairU} = ${ans} 根。`;
                }
                newQuestions.push(q4);

                // 5. 魔王題型
                const q5Type = randInt(1, 2);
                let q5 = { category: '魔王題型', type: 'boss' };
                if (q5Type === 1) {
                    const cupV = randInt(3, 5) * 100;
                    const stoneV = randInt(6, 12) * 10;
                    const ans = stoneV;
                    q5.q = `【閱讀陷阱】一個「裝滿水」的杯子容積是 ${cupV} 毫升(ml)，丟入一塊體積 ${stoneV} 立方公分的鐵塊並完全沉入水中，請問會溢出多少毫升的水？`;
                    q5.options = shuffleArray([ans, cupV + stoneV, cupV - stoneV, stoneV * 1000]);
                    q5.ans = ans;
                    q5.exp = `魔王陷阱題！因為杯子「已經裝滿」，所以丟入鐵塊後排開的水量會「完全等於」鐵塊的體積。鐵塊體積 ${stoneV} cm³，而 1 cm³ = 1 ml，所以會溢出 ${ans} 毫升的水，和杯子原本的容積無關。`;
                } else {
                    const scale = randInt(2, 5);
                    const baseL = randInt(5, 10);
                    const ans = scale * scale * scale;
                    q5.q = `【倍數觀念】一個正方體冰塊的邊長是 ${baseL} 公分，如果它受熱膨脹，邊長均勻變為原來的 ${scale} 倍，那麼它的「體積」會變為原來的幾倍？`;
                    q5.options = shuffleArray([ans, scale * scale, ans * 2, ans * 10]);
                    q5.ans = ans;
                    q5.exp = `體積 = 長 × 寬 × 高。當邊長變為 ${scale} 倍時，長、寬、高都各自變成了 ${scale} 倍，因此體積會變為 ${scale} × ${scale} × ${scale} = ${ans} 倍！(注意：不是 ${scale} 倍也不是 ${scale * scale} 倍喔)`;
                }
                newQuestions.push(q5);

                setQuestions(newQuestions);
                setUserAnswers({});
                setScore(0);
                setQuizState('playing');
            };

            const handleOptionChange = (qIndex, val) => {
                setUserAnswers(prev => ({ ...prev, [qIndex]: val }));
            };

            const handleSubmit = () => {
                if (Object.keys(userAnswers).length < 5) {
                    alert("還有題目尚未作答喔！");
                    return;
                }
                let correctCount = 0;
                questions.forEach((q, idx) => {
                    if (userAnswers[idx] === q.ans) correctCount++;
                });
                setScore(correctCount * 20);
                setQuizState('result');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            if (quizState === 'start') {
                return (
                    <div className="animate-fade-in flex flex-col items-center justify-center py-10">
                        <div className="w-24 h-24 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mb-6 shadow-inner">
                            <Target size={48} />
                        </div>
                        <h2 className="text-3xl font-black text-gray-800 mb-4">單位換算自我挑戰</h2>
                        <p className="text-lg text-gray-600 mb-8 max-w-lg text-center leading-relaxed">
                            準備好驗收成果了嗎？<br />每次測驗將由系統「<strong>隨機產生</strong>」5 道不同難度的題目，數字與情境皆不相同，真正考驗你的理解力而非記憶力！
                        </p>
                        <button
                            onClick={generateQuestions}
                            className="bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 px-12 rounded-full text-xl shadow-lg hover:shadow-xl transition-all hover:-translate-y-1"
                        >
                            開始挑戰
                        </button>
                    </div>
                );
            }

            return (
                <div className="animate-fade-in w-full flex flex-col lg:flex-row gap-6 items-start">
                    {/* 左側測驗區 */}
                    <div className="flex-1 w-full space-y-6">
                        <div className="bg-gradient-to-r from-amber-400 to-orange-500 rounded-2xl p-6 text-white shadow-lg flex justify-between items-center">
                            <div>
                                <h2 className="text-2xl font-black mb-1">實戰演練測驗</h2>
                                <p className="text-amber-100">{quizState === 'playing' ? '請細心作答每一題' : '測驗結果與詳細解析'}</p>
                            </div>
                            {quizState === 'result' && (
                                <div className="text-center bg-white/20 px-6 py-2 rounded-xl backdrop-blur-sm">
                                    <span className="block text-sm font-bold text-amber-100">你的得分</span>
                                    <span className="text-4xl font-black">{score}</span>
                                </div>
                            )}
                        </div>

                        {questions.map((q, idx) => {
                            const isCorrect = userAnswers[idx] === q.ans;
                            const isResult = quizState === 'result';

                            return (
                                <Card key={idx} className={`border-t-4 ${isResult ? (isCorrect ? 'border-green-500' : 'border-red-500') : 'border-amber-400'}`}>
                                    <div className="flex items-center gap-3 mb-4">
                                        <span className="bg-amber-100 text-amber-800 text-sm font-bold px-3 py-1 rounded-full">
                                            Q{idx + 1}. {q.category}
                                        </span>
                                        {isResult && (
                                            isCorrect ? <span className="text-green-500 font-bold flex items-center gap-1"><CheckCircle2 size={18} /> 答對了！</span>
                                                : <span className="text-red-500 font-bold flex items-center gap-1"><XCircle size={18} /> 答錯了</span>
                                        )}
                                    </div>
                                    <h3 className="text-xl font-bold text-gray-800 mb-6 leading-relaxed">{q.q}</h3>

                                    <div className="grid sm:grid-cols-2 gap-4">
                                        {q.options.map((opt, oIdx) => {
                                            let bgClass = "bg-gray-50 border-gray-200 hover:bg-gray-100";
                                            if (isResult) {
                                                if (opt === q.ans) bgClass = "bg-green-100 border-green-500 text-green-800 font-bold";
                                                else if (userAnswers[idx] === opt && !isCorrect) bgClass = "bg-red-50 border-red-300 text-red-600";
                                                else bgClass = "bg-gray-50 border-gray-100 opacity-60";
                                            }

                                            return (
                                                <label key={oIdx} className="relative cursor-pointer">
                                                    <input
                                                        type="radio"
                                                        name={`q${idx}`}
                                                        value={opt}
                                                        checked={userAnswers[idx] === opt}
                                                        onChange={() => handleOptionChange(idx, opt)}
                                                        disabled={isResult}
                                                        className="quiz-radio sr-only"
                                                    />
                                                    <div className={`border-2 rounded-xl p-4 transition-all duration-200 ${bgClass} ${!isResult && userAnswers[idx] === opt ? '!border-amber-500 !bg-amber-50' : ''}`}>
                                                        <span className="text-lg">{opt}</span>
                                                    </div>
                                                </label>
                                            );
                                        })}
                                    </div>

                                    {isResult && (
                                        <div className="mt-6 bg-slate-50 border border-slate-200 rounded-xl p-5 relative overflow-hidden">
                                            <div className="absolute left-0 top-0 w-1 h-full bg-blue-400"></div>
                                            <h4 className="font-bold text-blue-800 mb-2 flex items-center gap-2">
                                                <InfoIcon size={18} /> 詳細解析
                                            </h4>
                                            <p className="text-gray-700 leading-relaxed">{q.exp}</p>
                                        </div>
                                    )}
                                </Card>
                            );
                        })}

                        <div className="py-6 flex justify-center">
                            {quizState === 'playing' ? (
                                <button
                                    onClick={handleSubmit}
                                    className="bg-gray-800 hover:bg-black text-white font-bold py-4 px-12 rounded-full text-xl shadow-lg transition-all"
                                >
                                    送出答案看成績
                                </button>
                            ) : (
                                <button
                                    onClick={generateQuestions}
                                    className="bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 px-12 rounded-full text-xl shadow-lg transition-all flex items-center gap-2"
                                >
                                    <Target size={24} /> 再挑戰一次新的題目
                                </button>
                            )}
                        </div>
                    </div>

                    {/* 右側數位計算紙 (大螢幕時固定於右側) */}
                    <div className="w-full lg:w-80 shrink-0 sticky top-24 z-10 hidden md:block">
                        <Scratchpad />
                    </div>
                    {/* 小螢幕時顯示於底部的數位計算紙 */}
                    <div className="w-full md:hidden mt-4">
                        <Scratchpad />
                    </div>
                </div>
            );
        };

        // === 主應用程式元件 ===
        function App() {
            const [currentStep, setCurrentStep] = useState(0);

            const steps = [
                { id: 'intro', title: '開始', icon: CheckCircle2 },
                { id: '1d', title: '長度 (1D)', icon: Ruler },
                { id: '2d', title: '面積 (2D)', icon: Square },
                { id: '3d', title: '體積 (3D)', icon: Box },
                { id: 'trap', title: '陷阱與總結', icon: AlertTriangle },
                { id: 'quiz', title: '自我挑戰', icon: Target }
            ];

            const renderContent = () => {
                switch (currentStep) {
                    case 0:
                        return (
                            <div className="text-center animate-zoom-in py-12">
                                <h2 className="text-3xl sm:text-4xl font-extrabold text-blue-800 mb-6 drop-shadow-sm">歡迎來到「單位換算道場」！</h2>
                                <p className="text-lg sm:text-xl text-gray-600 mb-10 max-w-2xl mx-auto leading-relaxed">
                                    長度、面積、體積、容積... 老是搞混嗎？別擔心！<br />
                                    我們將透過互動圖解帶你破解奧秘，最後還有隨機題庫考驗你喔。準備好成為大師了嗎？
                                </p>
                                <button
                                    onClick={() => setCurrentStep(1)}
                                    className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-full text-xl shadow-lg hover:shadow-xl transition-all flex items-center gap-3 mx-auto"
                                >
                                    開始闖關 <ArrowRight />
                                </button>
                            </div>
                        );
                    case 1: return <LengthChapter />;
                    case 2: return <AreaChapter />;
                    case 3: return <VolumeChapter />;
                    case 4: return <TrapChapter />;
                    case 5: return <QuizChapter />;
                    default: return null;
                }
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-200">
                        <div className="max-w-5xl mx-auto px-2 sm:px-4 py-4">
                            <h1 className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 text-center mb-6">
                                📐 公制單位換算全攻略
                            </h1>

                            <div className="flex justify-between items-center relative">
                                <div className="absolute left-0 top-1/2 -translate-y-1/2 w-full h-1 bg-gray-200 -z-10"></div>
                                <div
                                    className="absolute left-0 top-1/2 -translate-y-1/2 h-1 bg-blue-500 -z-10 transition-all duration-500"
                                    style={{ width: `${(currentStep / (steps.length - 1)) * 100}%` }}
                                ></div>

                                {steps.map((step, idx) => {
                                    const Icon = step.icon;
                                    const isActive = idx === currentStep;
                                    const isPast = idx < currentStep;
                                    const isQuiz = idx === 5;
                                    const activeBg = isQuiz ? 'bg-amber-500 ring-amber-200' : 'bg-blue-600 ring-blue-100';
                                    const pastBg = isQuiz ? 'bg-amber-100 text-amber-600' : 'bg-blue-100 text-blue-600';

                                    return (
                                        <button
                                            key={step.id}
                                            onClick={() => setCurrentStep(idx)}
                                            className={`flex flex-col items-center gap-1 sm:gap-2 transition-all ${isActive ? 'scale-110' : 'hover:scale-105'} group`}
                                        >
                                            <div className={`w-8 h-8 sm:w-12 sm:h-12 rounded-full flex items-center justify-center shadow-md transition-colors duration-300 ${isActive ? `${activeBg} text-white ring-4` :
                                                    isPast ? pastBg : 'bg-gray-100 text-gray-400'
                                                }`}>
                                                <Icon size={18} className="sm:w-6 sm:h-6" />
                                            </div>
                                            <span className={`text-[10px] sm:text-xs font-bold hidden sm:block ${isActive ? (isQuiz ? 'text-amber-600' : 'text-blue-700') : 'text-gray-500'}`}>
                                                {step.title}
                                            </span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </header>

                    {/* 依照單元動態調整最寬版面 (自我挑戰單元需要較寬空間容納計算紙) */}
                    <main className={`mx-auto px-4 py-8 transition-all duration-500 ${currentStep === 5 ? 'max-w-6xl' : 'max-w-4xl'}`}>
                        {renderContent()}
                    </main>

                    {currentStep > 0 && currentStep < steps.length - 1 && (
                        <div className="max-w-4xl mx-auto px-4 flex justify-between pb-8">
                            <button
                                onClick={() => setCurrentStep(prev => Math.max(0, prev - 1))}
                                className="flex items-center gap-2 px-4 sm:px-6 py-3 rounded-lg font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 transition-colors"
                            >
                                <ArrowLeft size={20} /> <span className="hidden sm:inline">上一步</span>
                            </button>

                            <button
                                onClick={() => setCurrentStep(prev => Math.min(steps.length - 1, prev + 1))}
                                className={`flex items-center gap-2 px-4 sm:px-6 py-3 rounded-lg font-bold text-white shadow-md transition-colors ${currentStep === steps.length - 2 ? 'bg-amber-500 hover:bg-amber-600' : 'bg-blue-600 hover:bg-blue-700'}`}
                            >
                                <span className="hidden sm:inline">{currentStep === steps.length - 2 ? '進入自我挑戰' : '下一步'}</span> <ArrowRight size={20} />
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
