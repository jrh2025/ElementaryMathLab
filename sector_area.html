<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扇形面積魔法閣 - 互動學習平台</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .slider-thumb::-webkit-slider-thumb {
            appearance: none;
            width: 22px;
            height: 22px;
            background: #4f46e5;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .slider-thumb::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-sky-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 核心數學與 SVG 繪圖工具函數
        // ==========================================
        const polarToCartesian = (centerX, centerY, radius, angleInDegrees) => {
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return {
                x: centerX + (radius * Math.cos(angleInRadians)),
                y: centerY + (radius * Math.sin(angleInRadians))
            };
        };

        const describeSector = (x, y, radius, startAngle, endAngle) => {
            if (startAngle === endAngle) return "";
            const start = polarToCartesian(x, y, radius, endAngle);
            const end = polarToCartesian(x, y, radius, startAngle);
            const largeArcFlag = Math.abs(endAngle - startAngle) <= 180 ? "0" : "1";
            if (Math.abs(endAngle - startAngle) === 360) {
                return `M ${x} ${y - radius} A ${radius} ${radius} 0 1 1 ${x - 0.01} ${y - radius} Z`;
            }
            return ["M", x, y, "L", start.x, start.y, "A", radius, radius, 0, largeArcFlag, 0, end.x, end.y, "Z"].join(" ");
        };

        const Fraction = ({ top, bottom }) => (
            <span className="inline-flex flex-col items-center align-middle mx-1 font-bold text-current">
                <span className="border-b-2 border-current leading-none pb-[2px] px-1">{top}</span>
                <span className="leading-none pt-[2px] px-1">{bottom}</span>
            </span>
        );

        // ==========================================
        // 模組 1：基礎原理 & 弧長轉換
        // ==========================================
        function ArcLengthVisual() {
            const [slices, setSlices] = useState(2);
            const radius = 80;
            const angle = 90;
            const arcLength = 2 * Math.PI * radius * (angle / 360);
            const sliceAngle = angle / slices;
            const sliceBase = arcLength / slices;

            return (
                <div className="mt-8 bg-gradient-to-br from-emerald-50 to-teal-50 p-6 rounded-2xl shadow-sm border-l-4 border-emerald-400 animate-fade-in">
                    <h3 className="text-xl font-bold mb-2 text-emerald-800 flex items-center gap-2">
                        <span>💡</span> 進階知識：只給「弧長」怎麼辦？
                    </h3>
                    <p className="text-slate-700 mb-6 leading-relaxed">
                        如果題目沒有給圓心角，我們可以把扇形想像成一塊塊切得很細的披薩（近似三角形）。<br />
                        👉 <strong>拖曳下方滑桿</strong>，把扇形切碎並排開，你會發現它慢慢變成了一個大三角形！
                    </p>
                    <div className="flex flex-col items-center">
                        <svg viewBox="0 0 360 180" className="w-full max-w-2xl bg-white rounded-xl shadow-inner mb-6 border border-emerald-100 p-2">
                            <g transform="translate(80, 120)">
                                {Array.from({ length: slices }).map((_, i) => (
                                    <path key={i} d={describeSector(0, 0, radius, i * sliceAngle, (i + 1) * sliceAngle)} fill={i % 2 === 0 ? "#34d399" : "#6ee7b7"} stroke="#ffffff" strokeWidth="1" />
                                ))}
                                <line x1="0" y1="0" x2="0" y2={-radius} stroke="#059669" strokeWidth="2" strokeDasharray="2" />
                                <text x="-10" y={-radius / 2} textAnchor="end" fill="#059669" fontSize="12" fontWeight="bold">半徑(高)</text>
                            </g>
                            <g transform="translate(190, 120)">
                                {Array.from({ length: slices }).map((_, i) => (
                                    <polygon key={i} points={`${i * sliceBase},0 ${(i + 1) * sliceBase},0 ${(i + 0.5) * sliceBase},${-radius}`} fill={i % 2 === 0 ? "#34d399" : "#6ee7b7"} stroke="#ffffff" strokeWidth="0.5" />
                                ))}
                                <line x1="0" y1="10" x2={arcLength} y2="10" stroke="#f59e0b" strokeWidth="3" />
                                <text x={arcLength / 2} y="25" textAnchor="middle" fill="#d97706" fontSize="12" fontWeight="bold">底邊總和 = 弧長</text>
                                <line x1="-10" y1="0" x2="-10" y2={-radius} stroke="#059669" strokeWidth="2" strokeDasharray="2" />
                            </g>
                        </svg>
                        <div className="w-full max-w-md flex items-center gap-4 bg-white px-4 py-3 rounded-full shadow-sm">
                            <span className="font-bold text-slate-600 whitespace-nowrap">切片數量：{slices}</span>
                            <input type="range" min="2" max="30" value={slices} onChange={e => setSlices(Number(e.target.value))} className="flex-1 h-2 bg-emerald-100 rounded-lg appearance-none cursor-pointer accent-emerald-600 slider-thumb" />
                        </div>
                        <div className="mt-6 bg-white p-4 rounded-xl border-2 border-emerald-200 inline-flex items-center text-lg font-bold text-emerald-800 shadow-sm">
                            所有小披薩面積和 = <Fraction top="1" bottom="2" /> × 總底邊(弧長) × 高(半徑)
                        </div>
                    </div>
                </div>
            );
        }

        function BasicPrinciple() {
            const [angle, setAngle] = useState(90);
            const radius = 10;
            const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
            const divisor = gcd(angle, 360);
            const topStr = angle / divisor;
            const bottomStr = 360 / divisor;

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-400">
                        <h2 className="text-2xl font-bold mb-4 flex items-center gap-2"><span>🎯</span> 核心原理：扇形是圓的「分身」</h2>
                        <div className="flex flex-col md:flex-row items-center gap-8 bg-blue-50 p-6 rounded-xl">
                            <div className="relative w-64 h-64 flex-shrink-0">
                                <svg viewBox="0 0 200 200" className="w-full h-full drop-shadow-md">
                                    <circle cx="100" cy="100" r="90" fill="#e2e8f0" stroke="#cbd5e1" strokeWidth="2" />
                                    <path d={describeSector(100, 100, 90, 0, angle)} fill="#fcd34d" stroke="#fbbf24" strokeWidth="2" />
                                    <line x1="100" y1="100" x2="100" y2="10" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4 2" />
                                    <circle cx="100" cy="100" r="4" fill="#ef4444" />
                                </svg>
                            </div>
                            <div className="flex-1 space-y-6 w-full">
                                <div>
                                    <label className="block text-lg font-bold text-slate-700 mb-2">調整圓心角：<span className="text-blue-600 text-2xl">{angle}°</span></label>
                                    <input type="range" min="0" max="360" step="10" value={angle} onChange={(e) => setAngle(Number(e.target.value))} className="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600 slider-thumb" />
                                </div>
                                <div className="bg-white p-4 rounded-lg shadow-inner border border-blue-100">
                                    <h3 className="font-bold text-gray-500 text-sm mb-2">📝 基礎公式</h3>
                                    <div className="text-lg flex flex-wrap items-center gap-2">
                                        <span>扇形面積 = 圓面積</span><span>×</span><Fraction top={angle} bottom={360} />
                                    </div>
                                    <div className="mt-4 pt-4 border-t border-dashed border-gray-200">
                                        <p className="font-bold text-slate-700">現在的扇形佔了圓的：{angle === 0 ? "0" : <Fraction top={topStr} bottom={bottomStr} />}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <ArcLengthVisual />
                </div>
            );
        }

        // ==========================================
        // 模組 2：解題三部曲
        // ==========================================
        function DecomposeInteract() {
            const [split, setSplit] = useState(0);
            return (
                <div className="flex flex-col items-center w-full animate-fade-in">
                    <svg viewBox="0 0 200 120" className="w-full max-w-sm drop-shadow-md">
                        <g transform={`translate(${-split}, 0)`}>
                            <path d={describeSector(100, 50, 40, 180, 360)} fill="#fbcfe8" stroke="#f472b6" strokeWidth="2" />
                            <line x1="100" y1="10" x2="100" y2="90" stroke="#f472b6" strokeWidth="2" strokeDasharray="4" />
                            <text x="60" y="90" fontSize="12" fill="#d81b60" fontWeight="bold" opacity={split > 10 ? 1 : 0} className="transition-opacity">半圓</text>
                        </g>
                        <g transform={`translate(${split}, 0)`}>
                            <rect x="100" y="10" width="40" height="80" fill="#bfdbfe" stroke="#60a5fa" strokeWidth="2" />
                            <text x="110" y="90" fontSize="12" fill="#1d4ed8" fontWeight="bold" opacity={split > 10 ? 1 : 0} className="transition-opacity">長方形</text>
                        </g>
                    </svg>
                    <div className="mt-4 w-full max-w-xs"><input type="range" min="0" max="40" value={split} onChange={e => setSplit(Number(e.target.value))} className="w-full accent-blue-500 slider-thumb" /></div>
                </div>
            );
        }

        function SubtractInteract() {
            const [pull, setPull] = useState(0);
            return (
                <div className="flex flex-col items-center w-full animate-fade-in">
                    <svg viewBox="0 0 200 150" className="w-full max-w-sm drop-shadow-md">
                        <path d={describeSector(70, 110, 80, 0, 90)} fill="none" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="4" />
                        <path d="M 70 30 A 80 80 0 0 1 150 110 L 70 30 Z" fill="#f87171" stroke="#ef4444" strokeWidth="2" />
                        <g transform={`translate(${pull}, ${pull})`}>
                            <polygon points="70,110 70,30 150,110" fill="#ffffff" stroke="#94a3b8" strokeWidth="2" />
                            <text x="75" y="100" fontSize="11" fill="#64748b" opacity={pull > 10 ? 1 : 0}>扣除三角形</text>
                        </g>
                    </svg>
                    <div className="mt-4 w-full max-w-xs"><input type="range" min="0" max="40" value={pull} onChange={e => setPull(Number(e.target.value))} className="w-full accent-red-500 slider-thumb" /></div>
                </div>
            );
        }

        function RearrangeInteract() {
            const [move, setMove] = useState(0);
            return (
                <div className="flex flex-col items-center w-full animate-fade-in">
                    <svg viewBox="0 0 240 120" className="w-full max-w-sm drop-shadow-md">
                        <path d="M 140 30 A 20 20 0 0 0 140 70" fill="#e2e8f0" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4" />
                        <path d="M 60 30 L 140 30 A 20 20 0 0 0 140 70 L 60 70 L 60 30 Z" fill="#818cf8" stroke="#4f46e5" strokeWidth="1" />
                        <path d="M 60 30 A 20 20 0 0 0 60 70" fill="none" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4" />
                        <g transform={`translate(${80 * move / 100}, 0)`}>
                            <path d="M 60 30 A 20 20 0 0 0 60 70 Z" fill="#818cf8" stroke="#4f46e5" strokeWidth="2" />
                        </g>
                    </svg>
                    <div className="mt-4 w-full max-w-xs"><input type="range" min="0" max="100" value={move} onChange={e => setMove(Number(e.target.value))} className="w-full accent-indigo-500 slider-thumb" /></div>
                </div>
            );
        }

        function Trilogy() {
            const [activeStep, setActiveStep] = useState(0);
            const steps = [
                { title: "1. 拆 (組合圖形)", content: <DecomposeInteract /> },
                { title: "2. 減 (弓形與角落)", content: <SubtractInteract /> },
                { title: "3. 補 (割補法)", content: <RearrangeInteract /> }
            ];
            return (
                <div className="space-y-6 animate-fade-in">
                    <h2 className="text-2xl font-bold mb-6">解題三部曲：拆、減、補</h2>
                    <div className="flex flex-col md:flex-row gap-4">
                        <div className="flex md:flex-col gap-2 overflow-x-auto">
                            {steps.map((step, idx) => (
                                <button key={idx} onClick={() => setActiveStep(idx)} className={`p-4 rounded-xl text-left border-2 ${activeStep === idx ? 'border-blue-500 bg-blue-50' : 'border-transparent bg-white'}`}>
                                    <span className="font-bold">{step.title}</span>
                                </button>
                            ))}
                        </div>
                        <div className="flex-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-center items-center min-h-[300px]">
                            {steps[activeStep].content}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 模組 3：互動式變形題型 
        // ==========================================

        function InteractiveShift() {
            const [move, setMove] = useState(0);
            return (
                <div className="flex flex-col items-center w-full">
                    <svg viewBox="0 0 200 200" className="w-full max-w-[240px] mb-6 drop-shadow-md bg-white rounded-xl">
                        <rect x="60" y="60" width="80" height="80" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="4" />
                        <g>
                            <path d="M 60 60 L 140 60 L 140 140 L 60 140 Z" fill="#fcd34d" />
                            <path d={describeSector(60, 100, 40, 0, 180)} fill="#ffffff" />
                            <path d={describeSector(60, 100, 40, 0, 180)} fill="none" stroke="#f59e0b" strokeWidth="2" strokeDasharray="2" />
                        </g>
                        <g transform={`translate(${-move * 0.8}, 0)`}>
                            <path d={describeSector(140, 100, 40, 0, 180)} fill="#fcd34d" stroke="#d97706" strokeWidth="2" />
                            <text x="160" y="105" textAnchor="middle" fill="#92400e" fontWeight="bold" fontSize="12" opacity={move > 80 ? 0 : 1}>✂️搬運</text>
                        </g>
                    </svg>
                    <input type="range" min="0" max="100" value={move} onChange={e => setMove(Number(e.target.value))} className="w-full max-w-xs accent-amber-500 slider-thumb mb-2" />
                    <div className="text-center font-bold text-slate-500 text-sm mb-6">向左割補平移 ({move}%)</div>

                    <div className="w-full max-w-md bg-amber-50 border-l-4 border-amber-400 p-4 rounded-r-lg shadow-sm text-slate-700 text-sm md:text-base">
                        <h4 className="font-bold text-amber-800 mb-2">📝 實戰解說：移花接木</h4>
                        <p className="mb-2"><strong>題目：</strong>正方形邊長 <code className="bg-white px-1 rounded text-amber-600">10 公分</code>，左側被挖去一直徑 10 公分的半圓，右側外凸同等大小的半圓。求黃色塗色面積？</p>
                        <hr className="border-amber-200 my-2" />
                        <p className="font-bold mb-1">【解析步驟】</p>
                        <ul className="list-disc list-inside space-y-1">
                            <li>觀察發現，凸出的半圓與凹陷的洞<strong>面積完全相同</strong>。</li>
                            <li>如上方動畫拖曳，將右側半圓「平移」填補至左側。</li>
                            <li>圖形完美重組成一個邊長 10 公分的正方形。</li>
                            <li>面積計算：<code className="bg-white px-1 rounded font-bold text-amber-600">10 × 10 = 100 cm²</code>。</li>
                        </ul>
                    </div>
                </div>
            );
        }

        function InteractiveFourCorners() {
            const [move, setMove] = useState(0);
            return (
                <div className="flex flex-col items-center w-full">
                    <svg viewBox="0 0 200 200" className="w-full max-w-[240px] mb-6 drop-shadow-md bg-white rounded-xl">
                        <rect x="40" y="40" width="120" height="120" fill="#ffe4e6" stroke="#f43f5e" strokeWidth="2" />
                        <text x="100" y="105" textAnchor="middle" fill="#be123c" fontWeight="bold" fontSize="14" opacity={move > 20 ? 0 : 1}>星形空隙</text>
                        <g transform={`translate(${move * 0.6}, ${move * 0.6})`}>
                            <path d={describeSector(40, 40, 60, 90, 180)} fill="#fb7185" stroke="#e11d48" strokeWidth="1" />
                        </g>
                        <g transform={`translate(${-move * 0.6}, ${move * 0.6})`}>
                            <path d={describeSector(160, 40, 60, 180, 270)} fill="#fb7185" stroke="#e11d48" strokeWidth="1" />
                        </g>
                        <g transform={`translate(${-move * 0.6}, ${-move * 0.6})`}>
                            <path d={describeSector(160, 160, 60, 270, 360)} fill="#fb7185" stroke="#e11d48" strokeWidth="1" />
                        </g>
                        <g transform={`translate(${move * 0.6}, ${-move * 0.6})`}>
                            <path d={describeSector(40, 160, 60, 0, 90)} fill="#fb7185" stroke="#e11d48" strokeWidth="1" />
                        </g>
                    </svg>
                    <input type="range" min="0" max="100" value={move} onChange={e => setMove(Number(e.target.value))} className="w-full max-w-xs accent-rose-500 slider-thumb mb-2" />
                    <div className="text-center font-bold text-slate-500 text-sm mb-6">角落集中湊圓 ({move}%)</div>

                    <div className="w-full max-w-md bg-rose-50 border-l-4 border-rose-400 p-4 rounded-r-lg shadow-sm text-slate-700 text-sm md:text-base">
                        <h4 className="font-bold text-rose-800 mb-2">📝 實戰解說：四角湊圓</h4>
                        <p className="mb-2"><strong>題目：</strong>正方形邊長 <code className="bg-white px-1 rounded text-rose-600">20 公分</code>，四個角落各有半徑 10 公分的 1/4 圓。求中央紅色的星形面積？ (π=3.14)</p>
                        <hr className="border-rose-200 my-2" />
                        <p className="font-bold mb-1">【解析步驟】</p>
                        <ul className="list-disc list-inside space-y-1">
                            <li>星形面積 = <strong className="text-rose-600">正方形面積 - 四個角落的扇形</strong>。</li>
                            <li>拖曳滑桿可見，四個 1/4 圓拼起來剛好是「一個完整圓形」。</li>
                            <li>正方形面積：<code className="bg-white px-1 rounded">20 × 20 = 400</code></li>
                            <li>完整圓面積：<code className="bg-white px-1 rounded">10 × 10 × 3.14 = 314</code></li>
                            <li>星形面積：<code className="bg-white px-1 rounded font-bold text-rose-600">400 - 314 = 86 cm²</code>。</li>
                        </ul>
                    </div>
                </div>
            );
        }

        function InteractiveCommonLeaves() {
            const [type, setType] = useState(1);
            const [step, setStep] = useState(0);

            const renderSvgContent = () => {
                if (type === 1) {
                    return (
                        <g>
                            <rect x="10" y="10" width="100" height="100" fill="none" stroke="#94a3b8" strokeDasharray="4" />
                            <path d={describeSector(10, 110, 100, 0, 90)} fill="#1d4ed8" opacity={step > 20 ? 0.6 : 0} className="transition-opacity" />
                            <path d={describeSector(110, 10, 100, 180, 270)} fill="#1d4ed8" opacity={step > 60 ? 0.6 : 0} className="transition-opacity" />
                            {step > 90 && <path d="M 10 110 A 100 100 0 0 0 110 10 A 100 100 0 0 0 10 110 Z" fill="#1e3a8a" stroke="#ffffff" strokeWidth="2" />}
                        </g>
                    );
                } else if (type === 2) {
                    return (
                        <g>
                            <rect x="10" y="10" width="100" height="100" fill="none" stroke="#94a3b8" strokeDasharray="4" />
                            <path d={describeSector(60, 10, 50, 90, 270)} fill="#1d4ed8" opacity={step > 10 ? 0.4 : 0} className="transition-opacity" />
                            <path d={describeSector(60, 110, 50, -90, 90)} fill="#1d4ed8" opacity={step > 30 ? 0.4 : 0} className="transition-opacity" />
                            <path d={describeSector(10, 60, 50, 0, 180)} fill="#1d4ed8" opacity={step > 50 ? 0.4 : 0} className="transition-opacity" />
                            <path d={describeSector(110, 60, 50, 180, 360)} fill="#1d4ed8" opacity={step > 70 ? 0.4 : 0} className="transition-opacity" />
                            {step > 90 && (
                                <path d="M 60 10 A 50 50 0 0 1 110 60 A 50 50 0 0 1 60 110 A 50 50 0 0 1 10 60 A 50 50 0 0 1 60 10 Z" fill="#1e3a8a" stroke="#ffffff" />
                            )}
                        </g>
                    );
                } else {
                    return (
                        <g>
                            <rect x="10" y="10" width="100" height="100" fill="none" stroke="#94a3b8" strokeDasharray="4" />
                            <path d={describeSector(10, 10, 100, 90, 180)} fill="#1d4ed8" opacity={step > 10 ? 0.4 : 0} className="transition-opacity" />
                            <path d={describeSector(110, 10, 100, 180, 270)} fill="#1d4ed8" opacity={step > 30 ? 0.4 : 0} className="transition-opacity" />
                            <path d={describeSector(110, 110, 100, 270, 360)} fill="#1d4ed8" opacity={step > 50 ? 0.4 : 0} className="transition-opacity" />
                            <path d={describeSector(10, 110, 100, 0, 90)} fill="#1d4ed8" opacity={step > 70 ? 0.4 : 0} className="transition-opacity" />

                            {step > 80 && (
                                <g className="animate-fade-in">
                                    <polygon points="10,110 110,110 60,23.39" fill="none" stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="3" />
                                    <circle cx="60" cy="23.39" r="3" fill="#f59e0b" />
                                    <text x="60" y="16" textAnchor="middle" fill="#d97706" fontSize="7" fontWeight="bold">隱藏的正三角形</text>
                                </g>
                            )}
                        </g>
                    );
                }
            };

            return (
                <div className="flex flex-col items-center w-full animate-fade-in">
                    <div className="flex flex-wrap justify-center gap-2 mb-4 bg-slate-100 p-1 rounded-lg">

                                <li>多出來的就是葉片：<code className="bg-white px-1 rounded font-bold text-blue-600">157 - 100 = 57 cm²</code>。</li>

                            <p className="mb-2"><strong>題目：</strong>正方形邊長 <code className="bg-white px-1 rounded text-emerald-600">10 公分</code>，以四個邊為直徑向內畫 4 個半圓。求中央深藍色四葉草面積？</p>
                            <hr className="border-emerald-200 my-2" />
                            <p className="font-bold mb-1">【解析步驟】</p>
                            <ul className="list-disc list-inside space-y-1">

                                <li>兩個完整圓面積和：<code className="bg-white px-1 rounded">(5×5×3.14) × 2 = 157</code></li>
                                <li>多出來的重疊面積：<code className="bg-white px-1 rounded font-bold text-emerald-600">157 - 100 = 57 cm²</code>。</li>
                            </ul>
                        </div>

                            <p className="mb-2"><strong>題目：</strong>正方形邊長 10，以四個頂點為圓心，半徑 10 畫出 4 個 1/4 圓。求最中央的四芒星面積？</p>

                            <ul className="list-disc list-inside space-y-1">

                                <li>正三角形面積：<code className="bg-white px-1 rounded text-xs md:text-sm">10² × √3/4 = 25√3 ≈ 43.3</code></li>
                                <li>兩側剩下的「60°弓形」：<code className="bg-white px-1 rounded text-xs md:text-sm">60°扇形 - 正三角形 ≈ 52.3 - 43.3 = 9</code></li>

                                            </li>
                                            <li className="flex flex-col">
                                                <span className="text-amber-200 font-bold">● 正三角形面積：</span>

                                            </li>
                                        </ul>
                                    </div>
                                </div>

                                </div>
                            )}
                        </div>
                    </div>

                    <svg viewBox="0 0 120 120" className="w-full max-w-[240px] mb-6 drop-shadow-md bg-white p-2 rounded-xl border border-slate-200">

        function InteractiveWiper() {
            const [angle, setAngle] = useState(60);

            const bigArea = (12 * 12 * 3.14 * (angle / 360)).toFixed(1);
            const smallArea = (6 * 6 * 3.14 * (angle / 360)).toFixed(1);
            const diffArea = (bigArea - smallArea).toFixed(1);

            return (
                <div className="flex flex-col items-center w-full animate-fade-in">
                    <svg viewBox="0 0 240 220" className="w-full max-w-[320px] mb-6 drop-shadow-md bg-white rounded-xl p-2 border border-slate-100">
                        <path d={describeSector(140, 110, 120, 210, 330)} fill="none" stroke="#e2e8f0" strokeWidth="2" strokeDasharray="4" />
                        <path d={describeSector(140, 110, 50, 210, 330)} fill="none" stroke="#e2e8f0" strokeWidth="2" strokeDasharray="4" />
                        {angle > 0 && (
                            <path
                                d={`
                  M ${polarToCartesian(140, 110, 50, 210).x} ${polarToCartesian(140, 110, 50, 210).y} 
                  L ${polarToCartesian(140, 110, 120, 210).x} ${polarToCartesian(140, 110, 120, 210).y} 
                  A 120 120 0 0 1 ${polarToCartesian(140, 110, 120, 210 + angle).x} ${polarToCartesian(140, 110, 120, 210 + angle).y} 
                  L ${polarToCartesian(140, 110, 50, 210 + angle).x} ${polarToCartesian(140, 110, 50, 210 + angle).y} 
                  A 50 50 0 0 0 ${polarToCartesian(140, 110, 50, 210).x} ${polarToCartesian(140, 110, 50, 210).y} Z
                `}
                                fill="#818cf8" opacity="0.6" stroke="#4f46e5" strokeWidth="2"
                            />
                        )}
                        <line
                            x1={polarToCartesian(140, 110, 50, 210 + angle).x} y1={polarToCartesian(140, 110, 50, 210 + angle).y}
                            x2={polarToCartesian(140, 110, 120, 210 + angle).x} y2={polarToCartesian(140, 110, 120, 210 + angle).y}
                            stroke="#1e293b" strokeWidth="6" strokeLinecap="round"
                        />
                        <circle cx="140" cy="110" r="6" fill="#ef4444" />
                    </svg>
                    <input type="range" min="0" max="120" value={angle} onChange={e => setAngle(Number(e.target.value))} className="w-full max-w-xs accent-indigo-500 slider-thumb mb-2" />
                    <div className="text-center font-bold text-slate-500 text-sm mb-6">拖曳雨刷掃視 ({angle}°)</div>

                    <div className="w-full max-w-md bg-indigo-50 border-l-4 border-indigo-400 p-4 rounded-r-lg shadow-sm text-slate-700 text-sm md:text-base">
                        <h4 className="font-bold text-indigo-800 mb-2">📝 實戰解說：旋轉雨刷</h4>
                        <p className="mb-2"><strong>題目：</strong>汽車雨刷長度 6 公分，底部距離旋轉中心 6 公分。當雨刷旋轉 <code className="bg-white px-1 text-indigo-600 font-bold">{angle}°</code> 時，面積是多少？</p>
                        <hr className="border-indigo-200 my-2" />
                        <p className="font-bold mb-1">【動態解析：大扇形 - 小扇形】</p>
                        <ul className="list-disc list-inside space-y-1 font-mono text-sm">
                            <li>外側大扇形：12 × 12 × 3.14 × ({angle}/360) = <span className="text-indigo-600 font-bold">{bigArea}</span></li>
                            <li>內側小扇形：6 × 6 × 3.14 × ({angle}/360) = <span className="text-indigo-600 font-bold">{smallArea}</span></li>
                            <li className="pt-2 mt-2 border-t border-indigo-200 text-base">
                                掃過面積 = <strong className="text-indigo-700">{bigArea} - {smallArea} = {diffArea} cm²</strong>
                            </li>
                        </ul>
                    </div>
                </div>
            );
        }

                        <button onClick={() => setStep(2)} className={`flex-1 py-3 px-2 rounded-xl font-bold text-sm md:text-base shadow-sm transition-all ${step >= 2 ? 'bg-red-400 text-red-900' : 'bg-white text-slate-400'}`}>2. 繞過長邊</button>
                        <button onClick={() => setStep(3)} className={`flex-1 py-3 px-2 rounded-xl font-bold text-sm md:text-base shadow-sm transition-all ${step >= 3 ? 'bg-blue-400 text-blue-900' : 'bg-white text-slate-400'}`}>3. 繞過短邊</button>

                    <div className="w-full max-w-md bg-orange-50 border-l-4 border-orange-400 p-4 rounded-r-lg shadow-sm text-slate-700 text-sm md:text-base">
                        <h4 className="font-bold text-orange-800 mb-2">📝 實戰解說：角落吃草</h4>

                        <hr className="border-orange-200 my-2" />
                        <p className="font-bold mb-1">【點擊上方按鈕觀看解析】</p>
                        <ul className="list-disc list-inside space-y-1 font-mono text-sm">
                            <li className={`transition-opacity ${step >= 1 ? 'opacity-100' : 'opacity-30'}`}>
                                大扇形 (270°)：6×6×3.14×(3/4) = <span className="text-amber-600 font-bold">84.78</span>
                            </li>
                            <li className={`transition-opacity ${step >= 2 ? 'opacity-100' : 'opacity-30'}`}>
                                轉角1 (剩 6-4=2m)：2×2×3.14×(1/4) = <span className="text-red-600 font-bold">3.14</span>

                        </ul>

                </div>

            const [activeVar, setActiveVar] = useState(0);
            const variations = [
                { title: "🧩 移花接木", content: <InteractiveShift /> },
                { title: "🧀 四角湊圓", content: <InteractiveFourCorners /> },
                { title: "🍃 常見扇葉", content: <InteractiveCommonLeaves /> },
                { title: "✨ 不對稱扇葉", content: <InteractiveAsymmetricLeaf /> },
                { title: "🌀 旋轉雨刷", content: <InteractiveWiper /> },
                { title: "🐶 角落吃草", content: <InteractiveTethered /> },
            ];

            return (
                <div className="space-y-6 animate-fade-in w-full max-w-4xl mx-auto">
                    <div className="bg-yellow-50 p-4 rounded-xl border-l-4 border-yellow-400 mb-6 flex flex-col md:flex-row items-center gap-4">
                        <div className="text-3xl">⚠️</div>
                        <div>
                            <h3 className="font-bold text-yellow-800 text-lg mb-1">實戰魔王題詳解</h3>

            // Q4. 葉片面積

                q: `邊長 ${a4} 公分的正方形內，畫出兩個 1/4 圓交疊。這兩個 1/4 圓重疊的深色「葉片」面積是多少？`,

            });

            // Q5. 內聚四葉草 (已修正為使用 4個帶有透明度的半圓，呈現真實的面積疊加效果)
            const a5 = Math.floor(Math.random() * 5 + 5) * 2;
            const r5 = a5 / 2;
            const ans5 = (r5 * r5 * PI * 2) - (a5 * a5);
            qList.push({

                q: `邊長 ${a5} 公分的正方形，以四個邊為直徑向內畫 4 個半圓。求中央重疊的四葉草總面積？`,

                svg: (
                    <svg viewBox="0 0 100 100" className="w-24 h-24 drop-shadow-sm">

                        {/* 修正：使用4個透明的半圓，自然交疊出中心最深的四葉草圖案 */}
                        <path d={describeSector(50, 10, 40, 90, 270)} fill="#10b981" opacity="0.4" />
                        <path d={describeSector(50, 90, 40, -90, 90)} fill="#10b981" opacity="0.4" />
                        <path d={describeSector(10, 50, 40, 0, 180)} fill="#10b981" opacity="0.4" />
                        <path d={describeSector(90, 50, 40, 180, 360)} fill="#10b981" opacity="0.4" />
                        <text x="50" y="98" textAnchor="middle" fontSize="10" fill="#64748b">邊長={a5}</text>

                explanation: `【重疊扣除法】\n四個直徑為 ${a5} 的半圓，等同於「2個完整的圓」。圓半徑為 ${r5}。\n2個圓的面積 = 2 × (${r5} × ${r5} × 3.14) = ${2 * r5 * r5 * 3.14}\n正方形面積 = ${a5} × ${a5} = ${a5 * a5}\n四葉草是重疊區 = 2個圓面積 - 正方形面積 = ${Math.round(ans5 * 100) / 100}`
            });

            // Q6. 星形 (角落湊圓)
            const a6 = Math.floor(Math.random() * 5 + 5) * 2;
            const r6 = a6 / 2;
            const ans6 = (a6 * a6) - (r6 * r6 * PI);
            qList.push({
                type: '變形',
                q: `邊長 ${a6} 公分的正方形，四個角落各有半徑 ${r6} 公分的 1/4 圓。中央的星形空隙面積是多少？`,
                ans: ans6,

            });

            // Q7. 旋轉雨刷 (已修正角度中心線，避免超出畫布)
            const R7 = Math.floor(Math.random() * 5 + 15);
            const r7 = Math.floor(Math.random() * 5 + 5);
            const a7 = Math.floor(Math.random() * 3 + 2) * 30; // 60, 90, 120

            const donutPath7 = `M ${p1_7.x} ${p1_7.y} L ${p2_7.x} ${p2_7.y} A 65 65 0 0 1 ${p3_7.x} ${p3_7.y} L ${p4_7.x} ${p4_7.y} A 25 25 0 0 0 ${p1_7.x} ${p1_7.y} Z`;

                ans: ans7,
                svg: (
                    <svg viewBox="0 0 100 100" className="w-24 h-24 drop-shadow-sm">
                        {/* 修正：使用朝上(0度中心)的角度，避免整個圖被推到畫布左邊界外 */}
                        <path d={`M ${polarToCartesian(50, 90, 65, -60).x} ${polarToCartesian(50, 90, 65, -60).y} A 65 65 0 0 1 ${polarToCartesian(50, 90, 65, 60).x} ${polarToCartesian(50, 90, 65, 60).y}`} fill="none" stroke="#e2e8f0" strokeWidth="2" strokeDasharray="2" />
                        <path d={`M ${polarToCartesian(50, 90, 25, -60).x} ${polarToCartesian(50, 90, 25, -60).y} A 25 25 0 0 1 ${polarToCartesian(50, 90, 25, 60).x} ${polarToCartesian(50, 90, 25, 60).y}`} fill="none" stroke="#e2e8f0" strokeWidth="2" strokeDasharray="2" />

                        <path d={donutPath7} fill="#6366f1" opacity="0.8" stroke="#4f46e5" strokeWidth="1" />
                        <circle cx="50" cy="90" r="3" fill="#ef4444" />
                        <text x="50" y="98" textAnchor="middle" fontSize="8" fill="#4f46e5">轉 {a7}°</text>
                    </svg>
                ),
                explanation: `【同心圓相減】\n掃過面積 = 外側大扇形 - 內側小扇形\n大扇形面積 = ${R7}² × 3.14 × (${a7}/360) = ${R7 * R7 * 3.14 * (a7 / 360)}\n小扇形面積 = ${r7}² × 3.14 × (${a7}/360) = ${r7 * r7 * 3.14 * (a7 / 360)}\n兩者相減 = ${Math.round(ans7 * 100) / 100}`
            });

            // Q8. 角落吃草 (已修正：放大 ViewBox 並將半徑比例調整為完全符合數學邏輯 60:40:30，解決了原本圖形不合理突出的問題)
            const L8 = Math.floor(Math.random() * 3 + 6); // 6,7,8
            const w8 = 4;

            qList.push({
                type: '魔王',
                q: `小狗被長 ${L8} 公尺的繩子栓在長 ${w8} 公尺、寬 ${h8} 公尺的長方形房屋外角。求牠能活動的最大面積？`,
                ans: ans8,
                svg: (
                    <svg viewBox="0 0 200 200" className="w-24 h-24 drop-shadow-sm">
                        {/* 將比例精確化，半徑=60、屋寬=40、屋高=30。紅藍小扇形的半徑也完美契合 60-40=20 與 60-30=30 */}
                        <rect x="100" y="100" width="40" height="30" fill="#cbd5e1" stroke="#64748b" strokeWidth="1" />

                        <path d={describeSector(100, 130, 30, 90, 180)} fill="#60a5fa" opacity="0.8" stroke="#3b82f6" strokeWidth="1" />

                        <text x="120" y="118" textAnchor="middle" fontSize="11" fill="#475569" fontWeight="bold">房屋</text>
                    </svg>
                ),
                explanation: `【分段扇形疊加】\n1. 主區域 (270度扇形)：半徑為繩長 ${L8}m\n   ${L8}² × 3.14 × 3/4 = ${L8 * L8 * 3.14 * 0.75}\n2. 繞過長邊 (${w8}m) 剩下的扇形 (90度)：半徑 = ${L8} - ${w8} = ${L8 - w8}m\n   ${L8 - w8}² × 3.14 × 1/4 = ${Math.pow(L8 - w8, 2) * 3.14 * 0.25}\n3. 繞過短邊 (${h8}m) 剩下的扇形 (90度)：半徑 = ${L8} - ${h8} = ${L8 - h8}m\n   ${L8 - h8}² × 3.14 × 1/4 = ${Math.pow(L8 - h8, 2) * 3.14 * 0.25}\n總面積相加 = ${Math.round(ans8 * 100) / 100}`
            });

            // Q9. 移花接木 (平移)
            const a9 = Math.floor(Math.random() * 5 + 10);
            const ans9 = a9 * a9;
            qList.push({
                type: '概念',
                q: `正方形邊長 ${a9} 公分，左側被挖去一直徑 ${a9} 公分的半圓，右側外凸同等大小的半圓。求整體塗色面積？`,
                ans: ans9,
                svg: (
                    <svg viewBox="0 0 100 100" className="w-24 h-24 drop-shadow-sm">
                        <rect x="30" y="20" width="40" height="60" fill="none" stroke="#94a3b8" strokeDasharray="2" />
                        <path d="M 30 20 L 70 20 L 70 80 L 30 80 Z" fill="#fcd34d" />
                        <path d={describeSector(30, 50, 30, 0, 180)} fill="#ffffff" />

                ),
                explanation: `【平移割補法】\n左側被挖掉的半圓，面積與右側凸出來的半圓「完全相等」。\n將右側半圓「平移」填補至左側空缺，圖形將完美還原為一個邊長為 ${a9} 的正方形。\n塗色面積 = 正方形面積 = ${a9} × ${a9} = ${ans9}`
            });

            // Q10. 圓周長推導面積
            const r10 = Math.floor(Math.random() * 8 + 3);
            const C10 = Math.round((2 * PI * r10) * 100) / 100;
            const ans10 = r10 * r10 * PI;
            qList.push({
                type: '基礎',
                q: `已知一個圓的圓周長為 ${C10} 公分，請推算出此圓的面積大約是多少？`,
                ans: ans10,
                svg: (
                    <svg viewBox="0 0 100 100" className="w-24 h-24 drop-shadow-sm">
                        <circle cx="50" cy="50" r="40" fill="#e0f2fe" stroke="#0284c7" strokeWidth="2" strokeDasharray="4" />
                        <circle cx="50" cy="50" r="3" fill="#0284c7" />
                        <line x1="50" y1="50" x2="90" y2="50" stroke="#0284c7" strokeWidth="1.5" />
                        <text x="50" y="98" textAnchor="middle" fontSize="10" fill="#0284c7" fontWeight="bold">圓周長 C={C10}</text>
                    </svg>
                ),
                explanation: `【逆推法】\n圓周長公式 = 直徑 × π = 2 × 半徑 × π\n推導出半徑 = ${C10} / (2 × 3.14) = ${r10}\n求得面積 = 半徑 × 半徑 × π = ${r10} × ${r10} × 3.14 = ${Math.round(ans10 * 100) / 100}`
            });

            // --- 新增：動態誘答生成演算法 ---
            const generateOptions = (correctAnswer) => {
                const ans = Math.round(correctAnswer * 100) / 100;
                const options = new Set([ans]);

                // 產生基於常見計算錯誤的誘答 (例如未除以2、多除以2、或單純的計算偏差)
                const distractors = [
                    Math.round(ans * 2 * 100) / 100,
                    Math.round(ans / 2 * 100) / 100,
                    Math.round((ans + Math.floor(Math.random() * 15 + 5)) * 100) / 100,
                    Math.round(Math.abs(ans - Math.floor(Math.random() * 15 + 5)) * 100) / 100
                ];

                for (let d of distractors) {
                    if (options.size >= 4) break;
                    // 確保誘答不重複且大於 0
                    if (d !== ans && d > 0) options.add(d);
                }

                // 若選項不足 4 個，加入隨機擾動補齊
                while (options.size < 4) {
                    let fake = Math.round((ans * (0.7 + Math.random() * 0.6)) * 100) / 100;
                    if (fake !== ans && fake > 0) options.add(fake);
                }

                // 隨機打亂選項順序 (Fisher-Yates 洗牌的簡化版)
                return Array.from(options).sort(() => Math.random() - 0.5);
            };

            // 添加 ID、格式化答案，並生成選擇題選項及動態附加屬性
            return qList.map((item, idx) => ({
                id: idx,
                type: item.type,
                q: item.q,
                ans: Math.round(item.ans * 100) / 100,
                options: generateOptions(item.ans),
                svg: item.svg,
                explanation: item.explanation
            }));
        };

        function Quiz() {

            // 數位計算紙 State
            const [scratchInput, setScratchInput] = useState('');
            const [scratchHistory, setScratchHistory] = useState([
                { type: 'system', text: '啟動數位計算紙...' },
                { type: 'system', text: '支援運算: +, -, *, /, sqrt(x), pow(x,y), pi 等。' },
                { type: 'system', text: '💡 提示：本測驗請統一使用 pi = 3.14 進行計算。' }
            ]);
            const scratchEndRef = useRef(null);

            // --- 新增：清除算式功能 ---
            const handleClearHistory = () => {
                setScratchHistory([
                    { type: 'system', text: '系統提示：記憶體緩衝區已清空。' },
                    { type: 'system', text: '支援運算: +, -, *, /, sqrt(x), pow(x,y), pi 等。' }
                ]);
            };

            const handleDeleteLine = (index) => {
                setScratchHistory(prev => prev.filter((_, i) => i !== index));
            };

            useEffect(() => {
                initQuiz();
            }, []);

            useEffect(() => {
                if (scratchEndRef.current) {
                    scratchEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [scratchHistory]);

            const initQuiz = () => {
                setQuestions(generateDynamicQuestions());
                setUserAnswers({});
                setIsSubmitted(false);
                setScore(0);
            };

            const handleAnswerChange = (id, val) => {
                setUserAnswers(prev => ({ ...prev, [id]: val }));
            };

            const submitQuiz = () => {
                let currentScore = 0;
                questions.forEach(q => {
                    const uAns = parseFloat(userAnswers[q.id]);
                    // 選擇題架構：進行嚴格的數值比對
                    if (!isNaN(uAns) && uAns === q.ans) {
                        currentScore += 10;
                    }
                });
                setScore(currentScore);
                setIsSubmitted(true);
            };

            const handleScratchEval = (e) => {
                e.preventDefault();
                if (!scratchInput.trim()) return;

                let expression = scratchInput.trim();
                let result = '';

                try {
                    let parsedExpr = expression
                        .replace(/sqrt/g, 'Math.sqrt')
                        .replace(/pow/g, 'Math.pow')
                        .replace(/pi|π/gi, '3.14') // 配合國中小數學，強制 pi 為 3.14
                        .replace(/\^/g, '**');

                    const calcResult = new Function(`return ${parsedExpr}`)();

                    if (typeof calcResult === 'number' && !isNaN(calcResult)) {
                        result = Math.round(calcResult * 10000) / 10000;
                    } else {
                        result = '無法解析';
                    }
                } catch (err) {
                    result = '語法錯誤';
                }

                setScratchHistory(prev => [
                    ...prev,
                    { type: 'input', text: expression },
                    { type: 'output', text: `= ${result}` }
                ]);
                setScratchInput('');
            };

            if (questions.length === 0) return <div>載入中...</div>;

            return (
                <div className="flex flex-col lg:flex-row gap-6 animate-fade-in max-w-6xl mx-auto items-start">

                    {/* 左側：測驗卷區域 */}
                    <div className="flex-1 w-full bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="bg-indigo-600 p-6 text-white flex justify-between items-center">
                            <div>
                                <h2 className="text-2xl font-bold flex items-center gap-2">
                                    <i data-lucide="brain-circuit" className="w-6 h-6"></i>
                                    進階建模測驗 (10題)
                                </h2>
                                <p className="text-indigo-100 text-sm mt-1">請利用右側計算紙推導，並選出最符合的數值結果選項 (π=3.14)。</p>
                            </div>
                            <button onClick={initQuiz} className="bg-indigo-500 hover:bg-indigo-400 p-2 rounded-lg transition" title="重新產生題庫">
                                🔄
                            </button>
                        </div>

                        <div className="p-6 space-y-6 max-h-[70vh] overflow-y-auto bg-slate-50">
                            {questions.map((q, idx) => {
                                const uAns = parseFloat(userAnswers[q.id]);
                                const isCorrect = !isNaN(uAns) && uAns === q.ans;

                                let borderClass = "border-slate-200 bg-white";
                                if (isSubmitted) {
                                    borderClass = isCorrect ? "border-emerald-400 bg-emerald-50" : "border-rose-400 bg-rose-50";
                                }

                                return (
                                    <div key={q.id} className={`p-5 rounded-xl border-2 transition-colors ${borderClass}`}>
                                        <div className="flex flex-col sm:flex-row items-start gap-4 mb-4">
                                            {/* 渲染專屬題目的圖形 */}
                                            <div className="shrink-0 bg-white p-2 rounded-lg border border-slate-100 shadow-sm flex items-center justify-center">
                                                {q.svg}
                                            </div>
                                            <div className="flex-1">
                                                <span className={`px-2 py-1 inline-block rounded text-xs font-bold text-white mb-2 ${q.type === '基礎' ? 'bg-blue-500' :
                                                    q.type === '進階' ? 'bg-indigo-500' :
                                                        q.type === '變形' ? 'bg-purple-500' :
                                                            q.type === '魔王' ? 'bg-rose-500' : 'bg-amber-500'
                                                    }`}>
                                                    Q{idx + 1} | {q.type}
                                                </span>
                                                <p className="text-slate-700 font-medium leading-relaxed">{q.q}</p>
                                            </div>
                                        </div>

                                        {/* 選擇題選項網格 */}
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-4 font-mono text-sm">
                                            {q.options.map((opt, oIdx) => {
                                                const isSelected = uAns === opt;
                                                const isCorrectOption = opt === q.ans;

                                                let btnClass = "border-slate-200 bg-slate-50 hover:bg-slate-100 text-slate-700";

                                                if (isSubmitted) {
                                                    if (isCorrectOption) {
                                                        btnClass = "border-emerald-500 bg-emerald-100 text-emerald-800 font-bold shadow-sm"; // 正確答案高亮
                                                    } else if (isSelected && !isCorrectOption) {
                                                        btnClass = "border-rose-500 bg-rose-100 text-rose-800"; // 錯誤選擇高亮
                                                    } else {
                                                        btnClass = "border-slate-200 bg-slate-50 opacity-50"; // 其他選項淡化
                                                    }
                                                } else if (isSelected) {
                                                    btnClass = "border-indigo-500 bg-indigo-50 text-indigo-700 font-bold ring-2 ring-indigo-200"; // 點選狀態
                                                }

                                                return (
                                                    <button
                                                        key={oIdx}
                                                        disabled={isSubmitted}
                                                        onClick={() => handleAnswerChange(q.id, opt)}
                                                        className={`text-left px-4 py-3 rounded-lg border-2 transition-all flex items-center justify-between ${btnClass}`}
                                                    >
                                                        <span>{String.fromCharCode(65 + oIdx)}. {opt}</span>
                                                        {isSubmitted && isCorrectOption && <span className="text-emerald-600 text-lg leading-none">✓</span>}
                                                        {isSubmitted && isSelected && !isCorrectOption && <span className="text-rose-600 text-lg leading-none">✗</span>}
                                                    </button>
                                                );
                                            })}
                                        </div>

                                        {/* 提交後的詳解區塊 */}
                                        {isSubmitted && (
                                            <div className={`mt-4 p-4 rounded-lg font-mono text-sm whitespace-pre-wrap border ${isCorrect ? 'bg-emerald-100/50 border-emerald-200 text-emerald-800' : 'bg-white border-slate-200 text-slate-700'}`}>
                                                <div className="font-bold mb-2 flex items-center gap-2">
                                                    <span>📝</span> 專家解析與推導模型：
                                                </div>
                                                {q.explanation}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        <div className="p-6 bg-white border-t border-slate-200 flex justify-between items-center">
                            {isSubmitted ? (
                                <div className="text-xl font-bold">
                                    模型驗證得分： <span className={score >= 80 ? 'text-emerald-500' : 'text-rose-500'}>{score} / 100</span>
                                </div>
                            ) : (
                                <div className="text-slate-500 text-sm">請確認所有數值皆已填寫後提交</div>
                            )}

                            <button
                                onClick={submitQuiz}
                                disabled={isSubmitted}
                                className="bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-bold py-3 px-8 rounded-xl transition-colors shadow-sm"
                            >
                                提交驗證
                            </button>
                        </div>
                    </div>

                    {/* 右側：數位計算紙 (Sticky) */}
                    <div className="w-full lg:w-80 shrink-0 lg:sticky lg:top-8">
                        <div className="bg-slate-900 rounded-2xl shadow-xl overflow-hidden flex flex-col h-[500px] border border-slate-800">
                            <div className="bg-slate-950 p-4 border-b border-slate-800 flex items-center justify-between">
                                <div className="flex items-center gap-2 text-emerald-400 font-bold text-sm">
                                    <span className="text-lg">⌨️</span> 數位計算紙
                                </div>
                                <div className="flex items-center gap-3">
                                    <button onClick={handleClearHistory} className="text-xs text-slate-400 hover:text-rose-400 transition-colors flex items-center gap-1" title="全部清除">
                                        <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                        清空
                                    </button>
                                    <div className="flex gap-1.5 border-l border-slate-700 pl-3">
                                        <div className="w-3 h-3 rounded-full bg-rose-500"></div>
                                        <div className="w-3 h-3 rounded-full bg-amber-500"></div>
                                        <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
                                    </div>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 space-y-2 font-mono text-sm">
                                {scratchHistory.map((item, idx) => (
                                    <div key={idx} className={`group relative flex items-start justify-between
                                        ${item.type === 'system' ? 'text-slate-500 text-xs mb-2' : ''}
                                        ${item.type === 'input' ? 'text-slate-300 mt-2' : ''}
                                        ${item.type === 'output' ? 'text-emerald-400 font-bold pb-2 border-b border-slate-800' : ''}
                                    `}>
                                        <div className="flex-1 pr-6 break-all">
                                            {item.type === 'input' && <span className="text-slate-600 mr-2">&gt;</span>}
                                            {item.text}
                                        </div>
                                        <button
                                            onClick={() => handleDeleteLine(idx)}
                                            className="opacity-0 group-hover:opacity-100 text-slate-500 hover:text-rose-400 transition-opacity p-1 -mt-0.5"
                                            title="刪除此行"
                                        >
                                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                                        </button>
                                    </div>
                                ))}
                                <div ref={scratchEndRef} />
                            </div>

                            <form onSubmit={handleScratchEval} className="p-3 bg-slate-950 border-t border-slate-800">
                                <div className="relative">
                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-emerald-500 font-mono font-bold">&gt;</span>
                                    <input
                                        type="text"
                                        value={scratchInput}
                                        onChange={(e) => setScratchInput(e.target.value)}
                                        placeholder="輸入算式 (例: 10*10*pi/4)"
                                        className="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-8 pr-3 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-slate-200 font-mono text-sm placeholder-slate-600"
                                        autoComplete="off"
                                    />
                                </div>
                            </form>
                        </div>
                    </div>

                </div>
            );
        }

        // ==========================================
        // 主應用程式元件
        // ==========================================
        function App() {
            const [activeTab, setActiveTab] = useState('basic'); // 預設開啟基礎原理頁面

            // 初始化 Lucide icons
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab]);

            return (
                <div className="min-h-screen bg-sky-50 font-sans text-slate-800 pb-12">
                    <header className="bg-gradient-to-r from-blue-500 to-indigo-600 text-white p-4 shadow-lg mb-8">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between">
                            <h1 className="text-2xl md:text-3xl font-black mb-4 md:mb-0 flex items-center gap-2">
                                🍕 扇形面積魔法閣
                            </h1>
                            <nav className="flex flex-wrap justify-center gap-2">
                                {[
                                    { id: 'basic', label: '1. 基礎原理' },
                                    { id: 'trilogy', label: '2. 拆減補絕招' },
                                    { id: 'advanced', label: '3. 變形題型' },
                                    { id: 'quiz', label: '4. 建模實戰測驗 (New)' },
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`px-4 py-2 rounded-full font-bold transition-all ${activeTab === tab.id
                                            ? 'bg-white text-blue-600 shadow-md transform scale-105'
                                            : 'bg-blue-600/50 hover:bg-white/20'
                                            }`}
                                    >
                                        {tab.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4">
                        {activeTab === 'basic' && <div className="max-w-4xl mx-auto"><BasicPrinciple /></div>}
                        {activeTab === 'trilogy' && <div className="max-w-4xl mx-auto"><Trilogy /></div>}
                        {activeTab === 'advanced' && <div className="max-w-4xl mx-auto"><AdvancedVariations /></div>}
                        {activeTab === 'quiz' && <Quiz />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
